<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考古題練習 - iPAS AI 應用規劃師中級</title>
<style>
*{font-family:'Calibri','Microsoft JhengHei','微軟正黑體',sans-serif;margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0F1117;--panel:#1A1D27;--border:#2E3250;
  --text:#E8EAF6;--muted:#8892B0;
  --accent:#7C6FFF;--accent2:#00D4FF;--green:#00FFB2;
  --yellow:#FFD166;--orange:#FF9B42;--pink:#FF6B9D;
  --red:#FF4D6D;
}
body{background:var(--bg);color:var(--text);min-height:100vh;}
a{color:var(--accent2);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Hero */
.hero{padding:50px 20px 36px;text-align:center;
  background:linear-gradient(160deg,#0F1117,#131928,#0F1117);
  position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(124,111,255,.1),transparent);}
.badge{display:inline-block;margin-bottom:14px;padding:4px 16px;border-radius:999px;
  background:rgba(124,111,255,.12);border:1px solid var(--accent);
  font-size:.78rem;font-weight:900;color:var(--accent);letter-spacing:1px;}
.h-title{font-size:clamp(1.6rem,4vw,2.6rem);
  background:linear-gradient(135deg,var(--accent2),var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.h-sub{color:var(--muted);font-size:.92rem;max-width:500px;margin:0 auto;}
.back-link{display:inline-block;margin-top:16px;font-size:.82rem;color:var(--muted);}
.back-link:hover{color:var(--accent2);}

.wrap{max-width:860px;margin:0 auto;padding:20px 20px 80px;}

/* Exam tabs */
.exam-tabs{display:flex;gap:10px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0;}
.etab{padding:10px 22px;border-radius:8px 8px 0 0;border:1px solid transparent;
  border-bottom:none;cursor:pointer;font-size:.92rem;font-weight:700;
  color:var(--muted);background:transparent;transition:all .2s;margin-bottom:-1px;}
.etab.active{background:var(--panel);border-color:var(--border);
  border-bottom-color:var(--panel);color:var(--text);}
.etab:hover:not(.active){color:var(--text);}

/* Stats bar */
.stats-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.stat-chip{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;font-size:.8rem;color:var(--muted);}
.stat-chip span{font-weight:900;font-size:1rem;margin-right:4px;}
.stat-chip.correct span{color:var(--green);}
.stat-chip.wrong span{color:var(--red);}
.stat-chip.skip span{color:var(--yellow);}

/* Progress bar */
.progress-wrap{margin-bottom:16px;}
.progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}

/* Question nav dots */
.q-nav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px;}
.q-dot{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  background:var(--panel);cursor:pointer;font-size:.72rem;font-weight:700;
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:all .15s;}
.q-dot:hover{border-color:var(--accent);color:var(--accent);}
.q-dot.active{border-color:var(--accent);background:rgba(124,111,255,.2);color:var(--accent);}
.q-dot.answered-correct{background:rgba(0,255,178,.12);border-color:var(--green);color:var(--green);}
.q-dot.answered-wrong{background:rgba(255,77,109,.12);border-color:var(--red);color:var(--red);}
.q-dot.answered-skip{background:rgba(255,209,102,.1);border-color:var(--yellow);color:var(--yellow);}

/* Question card */
.q-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;}
.q-num{font-size:.75rem;font-weight:900;color:var(--muted);margin-bottom:10px;}
.q-text{font-size:1.02rem;line-height:1.75;color:var(--text);margin-bottom:22px;}
.q-note{font-size:.8rem;color:var(--yellow);background:rgba(255,209,102,.08);
  border:1px solid rgba(255,209,102,.25);border-radius:6px;padding:6px 10px;margin-bottom:14px;}

/* Options */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  transition:all .18s;background:rgba(255,255,255,.02);}
.opt:hover:not(.locked){border-color:var(--accent);background:rgba(124,111,255,.06);}
.opt.selected{border-color:var(--accent);background:rgba(124,111,255,.1);}
.opt.correct{border-color:var(--green);background:rgba(0,255,178,.07);}
.opt.wrong{border-color:var(--red);background:rgba(255,77,109,.07);}
.opt.locked{cursor:default;}
.opt-letter{width:26px;height:26px;min-width:26px;border-radius:6px;
  background:var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:900;color:var(--muted);transition:all .18s;}
.opt.selected .opt-letter{background:var(--accent);color:#fff;}
.opt.correct .opt-letter{background:var(--green);color:#0F1117;}
.opt.wrong .opt-letter{background:var(--red);color:#fff;}
.opt-text{font-size:.94rem;line-height:1.6;color:var(--text);flex:1;}

/* Explanation panel */
.explanation{margin-top:14px;border-radius:12px;overflow:hidden;display:none;}
.exp-header{padding:10px 16px;font-size:.82rem;font-weight:900;letter-spacing:.5px;}
.exp-header.correct-hdr{background:rgba(0,255,178,.12);color:var(--green);border-bottom:1px solid rgba(0,255,178,.2);}
.exp-header.wrong-hdr{background:rgba(255,77,109,.12);color:var(--red);border-bottom:1px solid rgba(255,77,109,.2);}
.exp-options{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-top:none;border-radius:0 0 12px 12px;padding:16px;}
.exp-opt{margin-bottom:12px;padding:10px 14px;border-radius:8px;font-size:.88rem;line-height:1.6;}
.exp-opt:last-child{margin-bottom:0;}
.exp-opt.exp-correct{background:rgba(0,255,178,.06);border:1px solid rgba(0,255,178,.2);}
.exp-opt.exp-wrong{background:rgba(255,255,255,.03);border:1px solid var(--border);}
.exp-letter{font-weight:900;margin-right:6px;}
.exp-opt.exp-correct .exp-letter{color:var(--green);}
.exp-opt.exp-wrong .exp-letter{color:var(--muted);}
.exp-opt-text{color:var(--muted);}

/* Controls */
.controls{display:flex;gap:10px;margin-top:4px;}
.btn{padding:11px 22px;border-radius:8px;border:1px solid;cursor:pointer;
  font-size:.9rem;font-weight:700;transition:all .18s;font-family:inherit;}
.btn-outline{border-color:var(--border);background:transparent;color:var(--muted);}
.btn-outline:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-primary{border-color:var(--accent);background:rgba(124,111,255,.15);color:var(--accent);}
.btn-primary:hover:not(:disabled){background:rgba(124,111,255,.25);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-confirm{border-color:var(--accent2);background:rgba(0,212,255,.12);color:var(--accent2);}
.btn-confirm:hover:not(:disabled){background:rgba(0,212,255,.22);}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed;}
.btn-skip{border-color:var(--yellow);background:rgba(255,209,102,.08);color:var(--yellow);}
.btn-skip:hover:not(:disabled){background:rgba(255,209,102,.16);}

/* Score result */
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:32px;text-align:center;display:none;margin-top:16px;}
.result-score{font-size:3.5rem;font-weight:900;margin:10px 0;}
.result-score.pass{color:var(--green);}
.result-score.fail{color:var(--red);}
.result-label{font-size:1.1rem;color:var(--muted);margin-bottom:20px;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.rg-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:14px;}
.rg-val{font-size:1.6rem;font-weight:900;}
.rg-val.c{color:var(--green);}
.rg-val.w{color:var(--red);}
.rg-val.s{color:var(--yellow);}
.rg-label{font-size:.75rem;color:var(--muted);margin-top:4px;}
.btn-restart{padding:11px 30px;border-radius:8px;border:1px solid var(--accent);
  background:rgba(124,111,255,.15);color:var(--accent);cursor:pointer;
  font-size:.9rem;font-weight:700;font-family:inherit;transition:all .18s;margin-top:10px;}
.btn-restart:hover{background:rgba(124,111,255,.25);}

footer{text-align:center;padding:20px;font-size:.75rem;color:rgba(232,234,246,.2);}
</style>
</head>
<body>

<div class="hero">
  <div class="badge">iPAS AI 應用規劃師 · 中級 · 考古題</div>
  <div class="h-title">考古題練習</div>
  <div class="h-sub">114 年第二梯次 · 科一 50 題 ／ 科三 50 題 · 含詳解</div>
  <a class="back-link" href="index.html">← 返回學習站首頁</a>
</div>

<div class="wrap">

  <!-- Exam Tabs -->
  <div class="exam-tabs">
    <button class="etab active" id="tab0" onclick="switchExam(0)">
      科一：AI 技術應用與規劃（50 題）
    </button>
    <button class="etab" id="tab1" onclick="switchExam(1)">
      科三：機器學習技術與應用（50 題）
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-chip correct"><span id="cnt-correct">0</span>答對</div>
    <div class="stat-chip wrong"><span id="cnt-wrong">0</span>答錯</div>
    <div class="stat-chip skip"><span id="cnt-skip">0</span>略過</div>
    <div class="stat-chip"><span id="cnt-remain">50</span>未作答</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-text">第 1 / 50 題</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- Question Nav -->
  <div class="q-nav" id="q-nav"></div>

  <!-- Question Display -->
  <div class="q-card" id="q-card">
    <div class="q-num" id="q-num">第 1 題</div>
    <div class="q-text" id="q-text"></div>
    <div class="q-note" id="q-note" style="display:none">⚠ 此題涉及程式碼圖片，請參閱原始試題圖形後作答。</div>
    <div id="q-img-wrap" style="display:none;margin-bottom:18px;"><img id="q-img" src="" alt="題目圖片" style="max-width:100%;border-radius:8px;border:1px solid var(--border);"></div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation">
      <div class="exp-header" id="exp-header"></div>
      <div class="exp-options" id="exp-options"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-outline" id="btn-prev" onclick="navigate(-1)" disabled>← 上一題</button>
    <button class="btn btn-skip" id="btn-skip" onclick="skipQuestion()">略過</button>
    <button class="btn btn-confirm" id="btn-confirm" onclick="confirmAnswer()" disabled>確認答案</button>
    <button class="btn btn-outline" id="btn-next" onclick="navigate(1)">下一題 →</button>
  </div>

  <!-- Result Card (shown after all answered) -->
  <div class="result-card" id="result-card">
    <div style="font-size:1.1rem;color:var(--muted);margin-bottom:4px;">本次成績</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-label" id="result-label"></div>
    <div class="result-grid">
      <div class="rg-item"><div class="rg-val c" id="r-correct">0</div><div class="rg-label">答對</div></div>
      <div class="rg-item"><div class="rg-val w" id="r-wrong">0</div><div class="rg-label">答錯</div></div>
      <div class="rg-item"><div class="rg-val s" id="r-skip">0</div><div class="rg-label">略過</div></div>
    </div>
    <button class="btn-restart" onclick="restartExam()">重新作答</button>
  </div>

</div>

<footer>114 年第二梯次 iPAS AI 應用規劃師中級考試公告試題 · 試題版權所有</footer>

<script>
// ── Question Data ──────────────────────────────
const EXAMS = [
  { name: '科一', questions: [{"id":1,"question":"台與商品評論中的文字內容，以即時掌握顧客對產品的滿意度變化。 若採用情感分析（Sentiment Analysis）模型，其主要目的為何？","options":{"A":"預測顧客使用的語言風格與語氣；","B":"判斷文本中所表達的情感傾向；","C":"將顧客留言自動翻譯成企業內部指定語言；","D":"產生顧客評論的自動化摘要內容"},"answer":"B","explanations":{"A":"語言風格分析屬於風格轉換任務，不是情感分析的目的。","B":"正確。情感分析模型的核心目的是判斷文本（如評論）中所表達的情感傾向（正面/負面/中性）。","C":"翻譯功能屬於機器翻譯（MT）任務，與情感分析無關。","D":"自動摘要屬於文字摘要（Text Summarization）任務，非情感分析功能。"}},{"id":2,"question":"某跨國金融科技公司導入 Transformer 架構開發多語客服系統，以提 升長篇金融文件的自動翻譯品質。下列何者為該模型能顯著改善翻譯 準確度的主要原因？","options":{"A":"透過自注意力機制（Self-Attention Mechanism）捕捉長距離語 境依賴關係；","B":"透過卷積運算（Convolution Operation）加速訓練過程；","C":"透過強化學習（Reinforcement Learning）自動調整語句生成策 略；","D":"透過資料增強（Data Augmentation）平衡多語語料比例"},"answer":"A","explanations":{"A":"正確。Transformer 的 Self-Attention 機制能計算序列中任意兩個位置的相關性，有效捕捉長距離語境依賴，是提升翻譯準確度的主要原因。","B":"CNN 用卷積加速局部特徵提取，但 Transformer 不使用卷積運算。","C":"Transformer 使用監督式學習訓練，非強化學習調整生成策略。","D":"資料增強可擴充訓練數據，但不是 Transformer 翻譯準確度提升的主要機制。"}},{"id":3,"question":"某企業計畫應用 BERT（Bidirectional Encoder Representations from Transformers）模型分析大量顧客意見，以強化客服自動回覆 系統。在BERT 的預訓練過程中，「遮罩語言模型（Masked Language Model, MLM）」的主要訓練策略為何？","options":{"A":"依序遮罩句尾詞語，讓模型從左到右逐步生成完整句子；","B":"隨機遮罩部分詞語，並讓模型根據雙向上下文（Bidirectional Context）預測被遮罩的詞；","C":"透過對抗訓練（Adversarial Training）生成語意相似的擾動樣 本以提升泛化性；","D":"以未遮罩的詞為條件，使用解碼器（Decoder）結構重建整句內容"},"answer":"B","explanations":{"A":"GPT 才是從左到右自迴歸生成，BERT 的 MLM 不採用此策略。","B":"正確。BERT 的 MLM 隨機遮罩 15% 的詞，並讓模型利用雙向（上下文左右兩側）資訊預測被遮罩的詞。","C":"對抗訓練是 BERT 變體（如 BERT-ATTACK）的技術，非預訓練核心策略。","D":"BERT 使用 Encoder 架構，無解碼器，且 MLM 是條件預測而非序列重建。"}},{"id":4,"question":"在詞向量（Word Embedding）訓練方法中，GloVe（Global Vectors for Word Representation）與Word2Vec 的主要差異為何？","options":{"A":"Word2Vec 以詞頻權重訓練詞向量，而 GloVe以隨機初始化向量進 行學習；","B":"Word2Vec 以全局統計矩陣為基礎，而 GloVe採用神經網路進行上 下文預測；","C":"Word2Vec 為基於預測的模型，而 GloVe為基於共現統計的模型；","D":"Word2Vec 僅能用於靜態文本語料，而 GloVe可應用於即時語料更 新"},"answer":"C","explanations":{"A":"描述相反，Word2Vec 基於預測模型，GloVe 利用共現矩陣統計。","B":"描述相反，GloVe 基於全局共現統計矩陣，Word2Vec 採用神經網路預測。","C":"正確。Word2Vec（Skip-gram/CBOW）是預測型模型（用詞預測上下文），GloVe 是基於全局共現統計矩陣的模型。","D":"兩者均訓練靜態詞向量，無即時語料更新能力，此說法有誤。"}},{"id":5,"question":"新 某企業以詞頻–逆文件頻率（Term Frequency–Inverse Document Frequency, TF-IDF）方法分析顧客意見內容，但發現模型在處理篇 幅較長的回饋文本時，無法準確反映關鍵詞的重要性。下列何者為造 成此現象的主要原因？","options":{"A":"長文本中的詞頻偏高，導致常見詞權重被過度放大；","B":"長文本中缺乏明確句子邊界，造成 TF-IDF 無法計算詞頻；","C":"TF-IDF 無法同時處理多份文件；","D":"長文本會改變 IDF（Inverse Document Frequency）的計算，使所 有詞權重趨於相近"},"answer":"A","explanations":{"A":"正確。TF-IDF 中，詞頻（TF）隨文本長度增加而偏高，導致常見詞（如「的」、「是」）在長文本中獲得過高權重，掩蓋真正的關鍵詞。","B":"TF-IDF 不需要句子邊界，它在詞（token）層級計算，文本長度不影響計算可行性。","C":"TF-IDF 本身就設計為跨文件計算（IDF 需多份文件），此說法錯誤。","D":"IDF 由文件集合決定，不因單份文件長短改變；長文本不會使所有詞 IDF 相近。"}},{"id":6,"question":"有詞權重趨於相近 某企業嘗試以 N-gram語言模型（N-gram Language Model）建立客服 自動回覆系統，但發現模型生成的句子雖在片段上合理，卻缺乏整體 語意連貫性。此問題最可能源自 N-gram 模型的哪一項限制？","options":{"A":"N-gram 模型在訓練過程中需要龐大計算量，導致長句無法收斂；","B":"N-gram 模型僅根據固定長度的前序詞建立機率估計，難以捕捉長 距離依賴關係（Long-range Dependencies）；","C":"N-gram 模型缺乏語意嵌入（Semantic Embedding）層，因此無法 表徵詞語間的語意相似度；","D":"N-gram 模型假設詞與詞之間相互獨立，導致無法建構上下文語意 關聯"},"answer":"B","explanations":{"A":"N-gram 的計算量主要在數據稀疏問題，訓練複雜度是 O(N)，非無法收斂問題。","B":"正確。N-gram 僅考慮前 N-1 個詞的條件機率，無法處理超過 N 個詞的長距離語境依賴，導致整體語意不連貫。","C":"N-gram 確實無語意嵌入，但缺乏語意相似度表徵是其特性而非生成不連貫的主要原因。","D":"N-gram 使用馬可夫假設（局部獨立性），而非完全詞詞獨立；完全獨立才是 Unigram 模型。"}},{"id":7,"question":"關聯 在企業導入的智慧監控系統中，模型以物件偵測（Object Detection）方式自動辨識影像中的人物與車輛。若評估指標採用平 均精確率（Mean Average Precision, mAP），其中 IoU （Intersection over Union）閾值設定較高時，代表下列哪一項意 義？","options":{"A":"預測邊界框與真實邊界框的重疊程度越高，模型偵測結果越精 準；","B":"預測邊界框與真實邊界框的誤差越大，導致 mAP數值上升；","C":"模型整體精確率（Precision）降低，但召回率（Recall）上升；","D":"預測邊界框的評估結果不受真實框大小影響"},"answer":"A","explanations":{"A":"正確。IoU（Intersection over Union）衡量預測框與真實框的重疊程度，IoU 閾值越高代表判定為正確預測的標準越嚴格，確保偵測結果更精準。","B":"IoU 越高代表誤差越小，mAP 數值理應上升而非因誤差大而上升，邏輯相反。","C":"較高的 IoU 閾值通常使召回率降低（更多框因不夠重疊被排除），不是 Precision 降低 Recall 上升。","D":"IoU 計算本身就包含真實框大小（分母包含兩框面積聯集），評估結果受真實框大小影響。"}},{"id":8,"question":"關於Softmax 與Max-Pooling，下列敘述何者正確？","options":{"A":"Softmax 與Max-Pooling都會將特徵張量壓縮為單一最大值；","B":"Max-Pooling 會對輸入進行機率分佈的轉換；","C":"Softmax 會保留所有輸入資訊，但以比例表示；","D":"Softmax 主要用於特徵降維，而Max-Pooling用於分類輸出"},"answer":"C","explanations":{"A":"Softmax 不壓縮為單一值，而是輸出所有類別的機率分布；Max-Pooling 取區域最大值，非壓縮為全局單一值。","B":"Max-Pooling 選取局部最大值以降低維度，不進行機率分布轉換；機率轉換是 Softmax 的功能。","C":"正確。Softmax 將所有輸入映射至 (0,1) 且總和為1，保留所有類別資訊（以機率比例表示）；Max-Pooling 只保留池化窗口內的最大值，丟棄其他資訊。","D":"Softmax 主要用於多分類輸出層的機率轉換，非特徵降維；Max-Pooling 用於特徵圖降維，非直接用於分類輸出。"}},{"id":9,"question":"某企業在訓練生成式 AI模型時，導入資料增強（Data Augmentation）技術以擴充訓練資料，但觀察到模型效能反而下降。 下列哪一項最可能的原因與對應改善策略最為正確？","options":{"A":"增強樣本未經隨機初始化，導致模型梯度更新不穩定，應重新設 計訓練啟動流程；","B":"增強後資料的特徵分佈與原始資料不一致，影響模型的泛化能 力，應檢查並調整增強策略以維持語意一致性；","C":"增強樣本的比例過高，造成模型對特定資料產生偏好，應適度提 高增強比例並調整學習率；","D":"增強後資料的標註可信度下降，導致訓練訊號偏差，應以半監督 學習方式重新校正資料"},"answer":"B","explanations":{"A":"梯度更新穩定性與增強樣本的初始化無關；問題根源是資料分布不一致。","B":"正確。資料增強若改變原始資料的特徵分布（如過度裁切、顏色扭曲），會使模型學習到不真實的特徵模式，降低泛化能力。應調整增強策略確保語意一致性。","C":"增強比例過高確實可能造成分布偏移，但提高增強比例並非正確的改善方向，反而會加劇問題。","D":"增強資料的標註通常由原始標籤衍生，標註可信度問題是另一議題；半監督學習也非對應此問題的最佳策略。"}},{"id":10,"question":"學習方式重新校正資料 如果希望同時兼顧「精確率（Precision）」和「召回率（Recall）」， 下列哪一個指標可以作為綜合評估的標準？","options":{"A":"準確率（Accuracy）；","B":"均方根誤差（RMSE）；","C":"均方誤差（MSE）；","D":"F1分數（F1 Score） 企業資料分析團隊使用 DBSCAN（Density-Based Spatial Clustering"},"answer":"D","explanations":{"A":"準確率（Accuracy）在類別不均衡時無法有效評估，且無法同時表達 Precision 和 Recall 的平衡。","B":"RMSE 是迴歸任務的誤差指標，不適用於分類任務的 Precision/Recall 評估。","C":"MSE 是迴歸任務指標，與分類評估無關。","D":"正確。F1 分數是 Precision 和 Recall 的調和平均值（2×P×R/(P+R)），能同時反映兩者，是二元分類的綜合評估標準。"}},{"id":11,"question":"企業資料分析團隊使用 DBSCAN（Density-Based Spatial Clustering of Applications with Noise）演算法進行顧客行為分群，並希望模 型能自動區分主要群集與雜訊資料。 在此演算法中，決定聚類結果的兩個主要超參數為下列何者？","options":{"A":"特徵數與學習率；","B":"K 值與距離閾值；","C":"鄰域半徑（Epsilon ε）與最小點數（MinPts）；","D":"交叉熵（Cross Entropy）與權重初始化"},"answer":"C","explanations":{"A":"特徵數是資料維度，學習率是梯度下降參數，均非 DBSCAN 的超參數。","B":"K 值是 K-means 的超參數，DBSCAN 不需要預設群數。","C":"正確。DBSCAN 由鄰域半徑 ε（決定鄰域大小）和最小點數 MinPts（決定核心點條件）兩個超參數控制，這兩個值直接影響聚類結果。","D":"交叉熵是損失函數，權重初始化是神經網路參數，與 DBSCAN 無關。"}},{"id":12,"question":"某金融科技公司建立房價預測模型，使用多項特徵（如建坪、房齡、 樓層、總價等）進行線性迴歸分析（Linear Regression Analysis）。資料分析師發現多個特徵之間存在高度相關性，導致模 型係數不穩定、預測誤差上升。為解決此問題，下列哪一種方法最適 合？","options":{"A":"繼續保留所有特徵，不進行任何處理；","B":"使用主成分分析（PCA）將相關特徵轉換為彼此獨立的主成分；","C":"新增更多原始變數以提升模型表現；","D":"改用分類模型進行預測"},"answer":"B","explanations":{"A":"保留高度相關的特徵會導致多重共線性，使模型係數估計不穩定，是問題根源而非解法。","B":"正確。PCA 將相關的多個特徵轉換為彼此正交（獨立）的主成分，消除多重共線性問題，同時保留主要變異資訊。","C":"增加更多原始變數會加劇多重共線性問題，不是解決方案。","D":"問題是連續型特徵的共線性，改用分類模型無法從根本解決特徵相關性問題。"}},{"id":13,"question":"下列何者為 Kubernetes在AI模型部署與運行中的核心功能？","options":{"A":"自動化管理模型的訓練流程與參數調校；","B":"管理與協調模型服務的部署、擴展與運行環境；","C":"提供AI 模型的資料儲存與版本控管功能；","D":"負責深度學習推論的 GPU 加速運算"},"answer":"B","explanations":{"A":"Kubernetes（K8s）是容器編排平台，不負責模型訓練或參數調校（那是 MLflow、Kubeflow 等工具的功能）。","B":"正確。Kubernetes 的核心功能是管理容器化服務的部署（Deployment）、自動擴展（Auto-scaling）和運行環境（包括負載均衡、服務發現），適合 AI 模型推論服務的維運。","C":"資料儲存和版本控管由 DVC、MLflow 等工具負責，非 Kubernetes 核心功能。","D":"GPU 加速推論由 CUDA、TensorRT 等框架負責，Kubernetes 負責管理容器而非計算加速。"}},{"id":14,"question":"在調整模型超參數（Hyperparameters）時，若希望避免因過度調整 參數而導致過擬合，下列哪一種做法最有效提升模型的泛化能力？","options":{"A":"採用交叉驗證（Cross-Validation）於多組參數組合間反覆評 估，選擇在驗證資料上表現最穩定的設定；","B":"使用早期停止機制（Early Stopping）監控訓練誤差並在收斂前 停止訓練，以防模型學習過度；","C":"對輸入特徵進行標準化以減少特徵值差異帶來的過擬合風險；","D":"提高模型複雜度並使用更多超參數搜尋範圍，以確保模型能充分 學習資料特徵"},"answer":"A","explanations":{"A":"正確。交叉驗證（如 K-Fold）在多組超參數上重複訓練/驗證，能有效評估模型在未見數據上的泛化能力，選出最穩定的超參數組合，避免因單次驗證集過擬合而誤選超參數。","B":"Early Stopping 監控的是驗證誤差（不是訓練誤差），且應在驗證誤差上升時停止；此外 Early Stopping 屬訓練策略，非超參數選擇方法。","C":"特徵標準化是資料前處理，可改善數值穩定性但不直接解決超參數過度調整的過擬合問題。","D":"提高模型複雜度和超參數搜尋範圍通常會加劇過擬合風險，與避免過擬合目標相悖。"}},{"id":15,"question":"學習資料特徵 在企業導入的 MLOps（Machine Learning Operations）流程中， Model Registry 最常用於哪一個階段？","options":{"A":"用於設定運算資源與執行環境以確保訓練穩定；","B":"用於建立可重複使用的資料與特徵版本；","C":"用於集中管理模型版本、訓練紀錄與部署狀態；","D":"用於追蹤模型上線後的表現與漂移情況"},"answer":"C","explanations":{"A":"Model Registry 不負責運算資源設定（那是 Kubernetes 或訓練平台的功能）。","B":"資料和特徵版本管理由 Feature Store 或 DVC 負責，Model Registry 聚焦於模型本身。","C":"正確。MLOps 中的 Model Registry 是集中管理模型的倉庫，記錄不同版本的模型、訓練實驗記錄（元數據）及各環境的部署狀態，方便模型的版本控制與治理。","D":"模型上線後的性能監控和漂移檢測屬於 Model Monitoring 階段，不是 Model Registry 的主要職責。"}},{"id":16,"question":"下列哪一種情境中最適合使用「序列到序列（Seq2Seq）」模型？","options":{"A":"預測銷售趨勢曲線，輸出未來數值序列；","B":"辨識文本中出現的人名、地名與組織名稱等實體資訊；","C":"對輸入文本中的關鍵字進行頻率統計與可視化；","D":"將輸入文字轉換成語意等價的另一段文字，如自動翻譯或摘要生 成"},"answer":"D","explanations":{"A":"銷售趨勢預測屬於時序預測，輸出為數值序列而非語意等價序列；適合 ARIMA 或 LSTM，Seq2Seq 較不典型。","B":"命名實體辨識（NER）是序列標記（Sequence Labeling）任務，輸出為每個詞的標籤，適合 CRF 或 BERT+NER，非 Seq2Seq。","C":"關鍵字頻率統計是簡單的詞頻分析，不需要 Seq2Seq 模型。","D":"正確。Seq2Seq 模型最適合輸入序列與輸出序列長度不同的語意轉換任務，如機器翻譯（將一種語言序列轉換為另一種）和文字摘要（將長文轉換為短摘要）。"}},{"id":17,"question":"成 在自然語言處理中，檢索增強生成（Retrieval-Augmented Generation, RAG）是一種結合語言模型與向量搜尋的技術，可有效 減少模型知識過時與產生幻覺的問題。若要建立一套高效能的 RAG系 統，下列何者為在「檢索階段」最關鍵的挑戰？","options":{"A":"確保檢索到的文件能被完整納入語言模型的上下文視窗（Context Window）中進行生成；","B":"選擇使用 Faiss或ScaNN等近似最近鄰搜尋函式庫；","C":"降低嵌入模型（Embedding Model）在高維空間中的計算成本與記 憶體占用；","D":"避免向量檢索結果僅具語意相似但與查詢意圖無實質關聯的情況"},"answer":"D","explanations":{"A":"確保文件納入上下文視窗是生成階段的挑戰（context length限制），不是檢索階段的核心問題。","B":"生成答案的連貫性屬於語言模型生成階段的挑戰，非檢索階段問題。","C":"Embedding 模型的計算成本在建索引時一次性承擔，查詢時的計算量相對固定，不是最關鍵的挑戰。","D":"正確。RAG 檢索階段最關鍵的挑戰是確保根據查詢意圖找到真正相關的文件（高精確率的語意檢索）。若檢索到的文件不相關，即使生成模型再強也無法產生正確回答，導致「garbage in, garbage out」。"}},{"id":18,"question":"當Transformer 模型發生「注意力分布過於平均（Attention Collapse）」的情形時，導致模型無法有效聚焦於關鍵資訊，下列哪 一項策略可有效改善此問題？","options":{"A":"提高Query-Key點積（Dot Product）的縮放常數；","B":"在Softmax 前加入高斯雜訊（Gaussian Noise）；","C":"使用 ReLU 函數取代 Softmax；","D":"對注意力權重施加稀疏化約束（Sparsity Constraint）"},"answer":"D","explanations":{"A":"減少訓練數據需求是小樣本學習（Few-shot）的目標，與 Attention 分布問題無關。","B":"僅增加頭數（heads）並不能解決注意力過於平均的問題，平均分布的根因需針對性解決。","C":"添加位置編碼能解決 Transformer 對序列位置不敏感的問題，但無法直接改善注意力分布過於平均的現象。","D":"正確。當注意力分布過於平均（entropy過高），表示模型無法有效聚焦於關鍵 token。對注意力權重施加稀疏化約束（如 top-k attention）能強制模型將注意力集中在最相關的位置。"}},{"id":19,"question":"某研究團隊正在訓練一個針對低資源語言（如少數民族語言）的語言 模型，但該語言僅有約 1萬筆語料可用。在訓練過程中出現明顯的過 擬合現象，若希望在不新增真實語料的前提下提升模型的泛化能力， 採用下列哪一種方法最為適合？","options":{"A":"將Transformer 的隱藏層維度擴增至 1024，以提升表徵能力；","B":"採用反向翻譯（Back-Translation）技術，以生成額外目標語句 的偽平行語料（Pseudo‑Parallel Corpus）；","C":"對詞嵌入矩陣（Embedding Matrix），施加L1正則化以壓縮模型 參數；","D":"將多語言 BERT（mBERT）中所有Transformer 層全部凍結以保留預 訓練知識"},"answer":"B","explanations":{"A":"從零訓練需要大量資源，對低資源語言尤其不可行，且無法利用預訓練知識。","B":"正確。凍結 Transformer 下層（通用特徵層）並微調上層（任務特定層），能在保留預訓練通用語言知識的同時，以少量低資源語言數據適應目標任務，是低資源語言場景的最佳策略。","C":"隨機初始化所有權重等同從零訓練，無法利用大規模預訓練的優勢，不適合低資源情境。","D":"凍結所有層代表模型完全不能學習目標任務的語言特性，無法適應低資源語言，效果最差。"}},{"id":20,"question":"訓練知識 在使用生成對抗網路（GAN）進行人臉影像生成時，若出現「模式崩 潰」（Mode Collapse）現象，下列哪一種方法最常被用來有效解決此 問題？","options":{"A":"在鑑別器中加入梯度懲罰（Gradient Penalty）以穩定訓練過 程；","B":"採用 Wasserstein 距離（WGAN 損失）替代原始的 GAN 損失函 數；","C":"對生成器輸入的潛在向量加入隨機擾動；","D":"使用多尺度鑑別器架構以提高對多樣性的判別能力"},"answer":"B","explanations":{"A":"增加訓練數據迭代可改善 GAN 穩定性，但 Mode Collapse 的根本原因是判別器過強或梯度消失，而非迭代次數不足。","B":"正確。Mode Collapse 發生時，生成器只生成能欺騙判別器的少數幾種樣本，使用多尺度或多種判別器（如 Progressive GAN）能從不同尺度約束生成多樣性，是有效的解決方案。","C":"降低生成器學習率可能減緩訓練，但不能直接解決 Mode Collapse 問題。","D":"Dropout 主要用於防止過擬合，對 GAN 中的 Mode Collapse 問題改善有限。"}},{"id":21,"question":"在多模態 AI 模型訓練或推論過程中，遇到某一模態資料缺失（例如 僅有影像資料但缺少文本說明），下列哪一種策略最有效維持模型效 能？","options":{"A":"以零向量或固定向量填充缺失模態輸入；","B":"訓練具備模態缺失感知能力的模型，使其適應缺失狀況；","C":"利用生成模型（如 GAN 或自迴歸模型）預測並補全缺失模態資 料；","D":"直接捨棄缺少模態的樣本，避免干擾訓練或推論"},"answer":"B","explanations":{"A":"缺失一個模態的數據時，完全用零填充會引入不真實的特徵，影響模型表現。","B":"正確。為缺失模態學習獨立的遮罩 Token（Mask Token）或嵌入，讓模型學習「此模態資訊不可用」的語意，是處理模態缺失最有效的方式，使模型具備更強的泛化能力。","C":"Dropout 是隨機捨棄神經元的正則化技術，不能模擬系統性模態缺失的情況。","D":"直接丟棄缺失模態的樣本可能大量減少訓練數據，且在實際推論時仍會遇到模態缺失問題，無法根本解決。"}},{"id":22,"question":"某電商平台開發的顧客流失預測模型在上線數月後，預測準確率明顯 下降。專案團隊懷疑顧客行為模式改變，導致模型輸入特徵的分佈與 原始訓練資料不同，出現典型的資料漂移（Data Drift）問題。為了 偵測並確認資料分佈是否發生變化，下列哪一種作法最合適？","options":{"A":"定期重新訓練模型以應對外部變化；","B":"提升模型複雜度以捕捉更多資料變異性；","C":"增加測試資料量以提高評估準確度；","D":"計算輸入特徵分佈間的 KL散度（KL Divergence）"},"answer":"D","explanations":{"A":"定期重新訓練是解決模型漂移的方法，但在描述問題（準確率下降原因）而非診斷步驟時，應先確認是否為特徵分布變化。","B":"引入新特徵可能改善模型，但如果原有特徵分布已改變，新特徵也可能面臨同樣問題。","C":"降低判斷閾值可調整 Precision/Recall 平衡，但無法解決根本的特徵分布漂移問題。","D":"正確。計算 KL 散度（KL Divergence）能量化當前輸入特徵分布與訓練時分布之間的差異程度，是診斷模型漂移（Data Drift）最直接的方法，幫助確認是否需要重新訓練。"}},{"id":23,"question":"某大型醫院即將部署一套輔助診斷的 AI系統，為降低對臨床流程的 衝擊，同時確保風險可控與回饋可收斂，應採取何種『漸進式部署』 （Phased Rollout）策略最為合適？","options":{"A":"從單一專科（如放射科）或特定病房開始啟用，逐步擴展至全 院；","B":"先部署於病例量較高的急診單位，加速收集高頻使用回饋；","C":"僅在夜班或離峰時段啟用，避免影響主要臨床工作負載；","D":"在使用者界面啟用提示模式，讓全院同步體驗但不影響診斷流程"},"answer":"A","explanations":{"A":"先在小部門測試可降低風險並收集真實回饋，是最佳的 AI 系統上線策略之一（Pilot Testing）。","B":"強制全院同步使用會增加推行阻力，且無法在真實情況下評估潛在風險。","C":"正確。採用「影子模式」讓 AI 系統在背景並行運作，不影響現有臨床流程，同時記錄 AI 建議與醫師實際決策的差異，能在零風險下收集真實數據評估系統性能，是最安全的上線策略。","D":"在使用者界面啟用提示模式會打擾臨床工作流程，且若提示不準確可能造成認知偏差。"}},{"id":24,"question":"某金融機構的 AI風控系統遭受對抗性攻擊，駭客透過對輸入特徵進 行微小但惡意的擾動，成功欺騙了模型。為了從根本上解決模型自身 對這類攻擊的脆弱性，下列何者並非針對此種攻擊型態的技術手段？","options":{"A":"強化資料前處理，用以過濾掉格式不符或數值極端異常的輸入；","B":"在模型訓練階段導入對抗樣本訓練，以提升模型對惡意特徵擾動 的辨識與防禦能力；","C":"於推論後階段使用規則引擎，以確保模型的預測結果不違反既有 的業務硬性規定；","D":"在模型部署環境中強化網路防火牆，以阻擋來自未授權來源的網 路連線"},"answer":"D","explanations":{"A":"使用可解釋性工具（如 SHAP）分析特徵重要性，能識別模型是否依賴異常特徵，是應對對抗性攻擊的有效措施。","B":"重新訓練前應先了解攻擊的特性（哪些特徵被操縱），否則新模型可能面臨相同攻擊。","C":"對抗訓練（Adversarial Training）是主動在訓練中加入對抗樣本，是提升模型對抗攻擊魯棒性最直接且有效的方法。","D":"正確（答案為D）。防火牆可防止未授權網路存取，但無法防止已通過驗證的請求中隱含的對抗性攻擊（對抗樣本是通過正常 API 請求發送的），因此是最不有效的防禦措施。"}},{"id":25,"question":"路連線 某企業部署生成式 AI系統協助行銷與內容產出，但近期遭質疑部分 生成內容可能涉及著作權侵權。為降低企業在法律層面的潛在責任與 風險，下列哪一項策略最能有效預防侵權問題產生？","options":{"A":"對生成內容進行語意相似度比對，自動標註可能涉及既有著作的 輸出結果，以降低侵權風險；","B":"建立訓練資料篩選與授權驗證機制，排除未授權或高風險資料來 源；","C":"在訓練與微調過程中採用差分隱私技術，避免模型記憶特定受著 作權保護的樣本；","D":"在模型輸出端嵌入浮水印（Watermarking）或數位指紋（Digital Fingerprint）技術，以確保生成內容可追溯"},"answer":"B","explanations":{"A":"加強版權審查是應對著作權問題的法律手段，不直接解決模型生成仿冒內容的技術問題。","B":"正確。在生成內容中嵌入數位浮水印或指紋，能在模型生成內容後可追溯其來源，證明內容由特定 AI 系統產生，有效應對知識產權爭議。","C":"RAG 系統能減少幻覺並引用真實來源，但若訓練數據包含受版權保護的內容，仍可能生成仿冒內容。","D":"完全禁止使用是過度限制，無法支援合法的業務應用需求。"}},{"id":26,"question":"Fingerprint）技術，以確保生成內容可追溯 在房價預測任務中，若發現特徵如「房間數」與「坪數」存在高度多 重共線性（Multicollinearity），為降低共線性對模型參數估計的負 面影響，應優先選擇下列哪種模型？","options":{"A":"不受多重共線性影響的決策樹模型；","B":"傳統線性迴歸模型，不含正則化項；","C":"支持向量機搭配線性核函數；","D":"含L1正則化的 LASSO迴歸模型"},"answer":"D","explanations":{"A":"線性迴歸適用於連續數值預測，對特徵之間的共線性敏感，不一定是最佳選擇。","B":"決策樹不具備天然的特徵選擇能力（除非使用特徵重要性），且對類別特徵的高基數可能過擬合。","C":"隨機森林是強力的集成方法，適合處理混合特徵，但相較於 LASSO 缺乏自動特徵稀疏化功能。","D":"正確。LASSO（L1 正則化迴歸）透過懲罰項使不重要特徵的係數縮為 0，自動進行特徵選擇，適合高維度特徵資料集中識別關鍵因子。"}},{"id":27,"question":"某企業需分析半結構化的系統日誌（JSON格式），以提取關鍵的時序 特徵供故障預測模型使用。考量日誌結構複雜且包含巢狀欄位 （Nested Fields），下列哪一種策略最有效且實務可行？","options":{"A":"先將JSON 資料扁平化轉成CSV，再對欄位計算統計量（如均值、 次數）作為特徵；","B":"使用遞歸神經網路（RNN）直接輸入原始 JSON字串進行時序特徵 抽取；","C":"設計遞迴函式展開巢狀欄位，並基於時間窗口（Time Window）進 行聚合與特徵萃取；","D":"只保留時間戳記欄位，忽略其他巢狀內容以簡化特徵工程"},"answer":"C","explanations":{"A":"直接轉換為關聯式資料庫需要預先定義 Schema，但 JSON 日誌的結構可能不規則，直接轉換會遺失巢狀結構資訊。","B":"使用 Pandas 的 json_normalize 能展開 JSON 的巢狀結構為扁平表格，同時保留時間戳記和其他欄位，是處理此類半結構化日誌的標準方法。","C":"正確（答案為C）。Spark + JSON 讀取功能能高效處理大量半結構化 JSON 日誌，並透過 select/explode 函數提取特定欄位（如時間戳記），適合大規模時序日誌分析。","D":"只保留時間戳記會丟失大量有價值的日誌資訊（如錯誤類型、請求參數），不適合完整的特徵工程需求。"}},{"id":28,"question":"在一個同時包含連續型特徵與類別型特徵的資料集中，若希望透過適 當的特徵工程流程來提升模型整體表現，下列哪一種作法最為合適？","options":{"A":"將類別型特徵使用標籤編碼（Label Encoding）轉換後，與連續 特徵直接合併進行模型訓練；","B":"將連續特徵進行離散化（Discretization）或分桶（Binning）轉 為類別型特徵，統一以類別方式處理；","C":"對連續特徵做標準化（Standardization），類別特徵採用目標編 碼（Target Encoding），並生成交互特徵提升模型表現；","D":"只保留連續特徵，忽略類別型變量以簡化模型"},"answer":"C","explanations":{"A":"獨熱編碼會使高基數類別特徵產生大量稀疏列，增加記憶體和計算負擔，不是最佳選擇。","B":"目標編碼（Target Encoding）以類別對應的目標變數均值替換類別值，能有效處理高基數特徵且保留語意，是正確方向，但需注意數據洩漏風險。","C":"正確（答案為C）。目標編碼（Mean Encoding）計算每個類別對應的目標變數均值作為特徵值，能有效處理高基數類別特徵，且數值表示保留了類別與目標的統計關係。","D":"忽略類別特徵會損失大量預測信號，特別是當類別特徵對目標變數有重要影響時。"}},{"id":29,"question":"某AI開發團隊為提升模型開發效率及品質控制，計畫實施持續整合 （Continuous Integration, CI）流程。下列哪一項做法最符合 CI 的核心實踐，且能有效減少整合風險？","options":{"A":"在主分支（Main Branch）每日固定時間手動合併並執行完整測試 流程；","B":"每次程式碼提交（Commit）後自動觸發建置、單元測試及靜態程 式碼分析；","C":"於模型訓練完成後，定期安排開發團隊回顧並合併程式碼；","D":"透過自動化部署腳本，將模型在特定時間點批次釋出到測試環境"},"answer":"B","explanations":{"A":"手動觸發部署仍然需要人工干預，無法達成真正的持續整合/部署（CI/CD）自動化。","B":"正確。CI/CD 管道在程式碼提交後自動執行訓練→評估→部署流程，若新模型性能指標超過閾值則自動部署到暫存環境，能大幅提升開發效率並確保品質控制。","C":"人工審核每次模型更新的步驟可作為最後防線，但不符合「自動化」的 CI/CD 精神。","D":"批次定期釋出無法及時回應模型性能變化，不如持續部署靈活高效。"}},{"id":30,"question":"某銀行計劃將 AI詐欺偵測模組整合至核心交易系統，主管機關要求 全流程必須符合金融監管對「不可否認性（Non-repudiation）」的資 訊安全規範，以確保日後能進行法務追蹤與稽核。下列哪一項措施最 能確保此要求的落實？","options":{"A":"為每筆 AI模型推論記錄其輸入與輸出結果的加密雜湊值 （Hash），並簽署數位簽章以確保不可竄改性；","B":"優化模型效能以降低平均推論延遲至 100ms以下，提升使用者體 驗；","C":"增加主機備援數量，以確保系統在故障時持續可用；","D":"將模型推論請求導入負載平衡器，避免單點壅塞導致服務延遲"},"answer":"A","explanations":{"A":"正確。藍綠部署（Blue-Green Deployment）維護兩套相同環境，可在不中斷服務的情況下瞬間切換流量，若新版本出現問題能立即回滾，是對監管審查環境最安全的部署策略。","B":"金絲雀部署將少量流量引導至新版本，雖然能降低風險，但若出現問題仍有部分使用者受影響，不如藍綠部署的零停機切換安全。","C":"滾動更新逐步替換舊版本，過程中新舊版本並存可能導致行為不一致，且回滾較藍綠部署複雜。","D":"將推論請求導入負載平衡器是常見的系統設計，但它解決的是流量分配問題，而非部署安全性問題。"}},{"id":31,"question":"某AI服務系統每次推論請求需約 1秒完成，且必須支撐高達 10,000 次請求每秒（RPS）的流量。為確保系統具備高可用性且能穩定應付 流量峰值，下列哪一種架構方案最為合適？","options":{"A":"依賴單台超高效能伺服器進行垂直擴展，提升硬體規格；","B":"採用容器化部署並水平擴展服務實例，結合自動彈性伸縮機制 （Auto Scaling）；","C":"限制最大併發連線數，以避免系統過載；","D":"增加批次處理大小，一次同時處理上千筆請求"},"answer":"B","explanations":{"A":"垂直擴展（增加單機資源）有物理上限，且無法解決高並發（10,000 RPS）的橫向擴展需求。","B":"正確。水平擴展（增加更多服務實例）搭配負載平衡器，能線性提升推論吞吐量（throughput），是應對 10,000 RPS 高並發需求的標準解法。","C":"模型量化（INT8/FP16）能減少單次推論時間，但不能解決並發量過高的問題。","D":"增加批次處理大小（batch size）在離線批次推論中有效，但對即時（online）推論的延遲有負面影響，且仍需搭配水平擴展。"}},{"id":32,"question":"某企業已將 AI模型部署於生產環境，為確保系統持續穩定運作，並 能提前偵測模型效能可能衰退，技術團隊希望透過監控指標進行預 警。 下列哪一項監控指標最具預測效力，能提早發現模型效能下滑風險？","options":{"A":"系統CPU 與記憶體使用率波動幅度；","B":"模型推論結果的置信度（Confidence）分佈變化趨勢；","C":"API平均回應時間與延遲百分位數變化；","D":"輸入特徵與訓練資料分布差異的 PSI（Population Stability Index）指數 企業團隊在使用 Word2Vec模型訓練客服文本語料時，若訓練資料量"},"answer":"D","explanations":{"A":"重新訓練頻率應由監控數據驅動，而非固定週期；過於頻繁可能造成不必要的資源浪費。","B":"Canary 部署可降低新模型上線風險，但不能主動監控既有模型的性能退化。","C":"A/B 測試用於比較新舊模型性能，適合模型更新評估，但不是持續監控既有模型穩定性的最佳工具。","D":"正確。PSI（Population Stability Index）量化輸入特徵分布相對於訓練時的變化程度，是偵測資料漂移（Data Drift）的標準指標，若 PSI 超過閾值即觸發模型再訓練，是最合適的監控機制。"}},{"id":33,"question":"Index）指數 企業團隊在使用 Word2Vec模型訓練客服文本語料時，若訓練資料量 龐大且希望模型能更有效捕捉罕見詞的語意關聯，下列哪一種訓練策 略最為適合？","options":{"A":"採用Skip-gram模型，但以隨機初始化權重加快高頻詞的訓練收 斂；","B":"採用CBOW 模型（Continuous Bag of Words Model）並結合 TF- IDF權重以強化低頻詞表示；","C":"採用Skip-gram模型，利用中心詞預測周圍詞語，能更有效學習 低頻詞關係；","D":"採用CBOW 模型（Continuous Bag of Words Model），利用周圍詞 預測中心詞，能提升罕見詞的語意穩定度"},"answer":"C","explanations":{"A":"增加訓練迭代次數有助於模型學習，但對 OOV（Out-of-Vocabulary）問題的根本解決有限。","B":"使用更大語料庫能覆蓋更多詞彙，但仍無法完全解決客服領域的大量縮寫、品牌名等 OOV 詞彙問題。","C":"正確（答案為C）。CBOW 利用上下文詞預測中心詞，對罕見詞的語意學習效果比 Skip-gram 好；更重要的是，使用字元（subword）n-gram（如 FastText）能處理未知詞，比標準 Word2Vec 更適合客服場景。","D":"Negative Sampling 是 Word2Vec 的訓練優化技術，能提升訓練效率，但不直接解決 OOV 問題。"}},{"id":34,"question":"預測中心詞，能提升罕見詞的語意穩定度 在自駕車影像辨識系統中，開發團隊希望模型能同時辨識每個像素所 屬的物件類別（例如道路、建築、行人），又能區分出同類物件的不 同個體（例如多位行人）。此時最適合採用下列哪一項電腦視覺技 術？","options":{"A":"語義分割（Semantic Segmentation）；","B":"物件偵測（Object Detection）；","C":"實例分割（Instance Segmentation）；","D":"全景分割（Panoptic Segmentation）"},"answer":"D","explanations":{"A":"語義分割（Semantic Segmentation）為每個像素分配類別標籤，但不區分同類別的不同實例（如兩輛車）。","B":"物件偵測（Object Detection）輸出邊界框和類別，但不提供像素級的精確輪廓。","C":"實例分割（Instance Segmentation）如 Mask R-CNN，為每個物件實例提供獨立的像素遮罩，能精確區分同類不同物件，最適合精確輪廓需求。","D":"正確（答案為D）。全景分割（Panoptic Segmentation）結合語義分割（覆蓋背景/物體）和實例分割（區分個別物件），為自駕車場景提供最完整的場景理解能力。"}},{"id":35,"question":"某媒體公司計畫導入 CLIP（Contrastive Language–Image Pre- training）模型，以協助大量影像自動標註與搜尋，並希望在無需新 增標訓資料的情況下，僅透過文字提示（Text Prompt）即可識別影 像內容。請問此應用情境中，CLIP能夠達成的關鍵技術特性為何？","options":{"A":"透過圖文對比式學習（Contrastive Learning）將影像與文字映 射至共同嵌入空間（Shared Embedding Space），可直接以語意相似 度進行零樣本分類；","B":"透過影像增強與特徵擴散降低標訓資料需求；","C":"以監督式學習結合多層感知器（Multilayer Perceptron, MLP） 進行影像特徵分類；","D":"以自迴歸生成模型（Autoregressive Model）逐步生成文字標籤 描述影像內容"},"answer":"A","explanations":{"A":"正確（答案為A）。影像描述生成是多模態任務，需要模型理解視覺特徵並生成對應的自然語言描述。使用 CNN（視覺編碼器）+ 自迴歸語言模型（文字解碼器）是標準做法，能逐步生成完整且語意連貫的描述。","B":"平均多模型預測（Ensemble）可提升分類準確度，但無法生成豐富的文字描述內容。","C":"使用預訓練 CLIP 進行零樣本分類雖然強大，但 CLIP 輸出的是圖文匹配分數，不直接生成描述性語句。","D":"強化學習可用於優化語言生成策略（如 RLHF），但作為影像描述的主要架構過於複雜，且需要明確的獎勵信號設計。"}},{"id":36,"question":"描述影像內容 某資料科學團隊在開發預測模型時，針對多種模型設定（如學習率、 樹深度、正則化係數等）進行系統化測試，希望找出在驗證資料上表 現最穩定的組合。此過程最可能採用下列哪一種方法？","options":{"A":"使用交叉驗證（Cross Validation）反覆評估模型以降低過擬合 風險；","B":"透過網格搜尋（Grid Search）在多組超參數設定中進行系統化搜 尋與評估；","C":"以隨機搜尋（Random Search）快速探索部分參數空間以提升搜尋 效率；","D":"採用貝葉斯優化（Bayesian Optimization）根據歷次結果動態調 整搜尋方向"},"answer":"B","explanations":{"A":"Grid Search 對所有超參數組合進行窮舉搜尋，在高維空間計算成本極高且效率低。","B":"正確。貝葉斯優化利用前幾次評估結果建立代理模型（surrogate model），智慧地選擇下一個最有潛力的超參數組合，比 Grid Search 和 Random Search 效率更高，特別適合計算代價高的模型訓練。","C":"早期停止（Early Stopping）是訓練策略，能節省單次訓練時間，但不是超參數搜尋方法。","D":"增加驗證集比例可提升評估可靠性，但不能加速超參數搜尋過程。"}},{"id":37,"question":"整搜尋方向 某公司正在訓練一個大型語音合成模型，開發團隊使用多台 GPU 進行 訓練，但經常出現 GPU 記憶體不足問題。由於模型架構已固定且無 法更換硬體，團隊希望在維持模型效能與收斂品質的前提下，下列哪 一種方法最有效降低單張 GPU 的記憶體壓力？","options":{"A":"減少訓練資料量以降低記憶體使用；","B":"採用較小的批次大小（Batch Size）並搭配資料分片（Data Sharding）分散訓練負載；","C":"增加學習率（Learning Rate）以加快收斂速度；","D":"改用測試資料集（Test Set）進行部分訓練以節省空間"},"answer":"B","explanations":{"A":"資料並行（Data Parallelism）將同一個批次的數據分配給不同 GPU，各自計算梯度再匯總，適合批次大的場景。","B":"正確（答案為B）。模型並行（Model Parallelism）將模型的不同層分配到不同 GPU，適合超大模型（單張 GPU 無法容納全部參數）；梯度累積（Gradient Accumulation）在記憶體不足時模擬大批次訓練，兩者結合是處理超大模型訓練的標準策略。","C":"混合精度訓練（FP16）能減少記憶體佔用約 50%，是常用的優化技術，但對於無法放入單張 GPU 的超大模型，仍需搭配模型並行。","D":"改用測試資料集進行訓練違背了機器學習的基本原則（測試集應保持獨立），絕對不是解決記憶體問題的方法。"}},{"id":38,"question":"某影像設計團隊在使用 Stable Diffusion 生成4K級產品圖時，發現 影像邊緣與細節存在顆粒化與模糊現象。 若僅能在生成階段進行調整，希望提升畫面清晰度與紋理層次，同時 避免過度平滑，下列哪一項作法最適合？","options":{"A":"降低取樣步數，以縮短生成時間；","B":"增加取樣步數並選擇高品質取樣器，以強化細節還原度；","C":"提高CFG（Classifier-Free Guidance）值，使生成結果更具創意 與多樣性；","D":"改用低解析度輸入以降低計算成本"},"answer":"B","explanations":{"A":"增加批次大小（Batch Size）在記憶體充足時可提升訓練速度，但對 GPU 記憶體不足的根本問題沒有幫助，反而可能加劇記憶體壓力。","B":"正確。降低圖像解析度（如從 4K 降到 1K）能大幅減少特徵圖的記憶體佔用，是在不改變模型架構情況下快速緩解 GPU OOM（Out of Memory）的有效方法；另一方法是使用梯度檢查點（Gradient Checkpointing）。","C":"使用 CPU 進行部分計算會因 CPU-GPU 資料傳輸瓶頸而大幅降低速度，是最低效的解決方案。","D":"低解析度輸入雖能減少記憶體壓力，但描述「改用低解析度輸入以降低計算成本」的策略與B相近，但B是針對4K高解析度問題的最直接解法。"}},{"id":39,"question":"某企業的資料科學團隊利用 ARIMA模型（AutoRegressive Integrated Moving Average Model）預測每週產品銷售量。模型建 立完成後，分析人員發現預測誤差隨時間呈現週期性波動，且自相關 函數（ACF）顯示殘差在多個時滯（Lag）上仍顯著不為零。根據上述 現象，最合理的模型診斷結論為何？","options":{"A":"模型殘差符合白噪音（White Noise）假設，預測表現穩定；","B":"模型殘差雖有輕微異常，但可視為隨機誤差忽略不計；","C":"模型存在配適不足（Underfitting）問題，需重新調整 p 或 q 參數以捕捉時間依賴性；","D":"殘差特性不影響預測結果，無須進一步修正"},"answer":"C","explanations":{"A":"時間序列交叉驗證（如 Walk-Forward Validation）需要將資料按時間順序切割，確保驗證集的時間點晚於訓練集，避免未來資料洩漏。","B":"ARIMA 的殘差若為白雜訊（White Noise），表示模型已充分捕捉時序結構；若有自相關，應調整 p/q 階數。","C":"正確（答案為C）。ARIMA 模型的殘差（residuals）應符合白雜訊假設：無自相關、均值為零、方差穩定。若 ACF/PACF 圖顯示殘差有顯著自相關，表示模型結構未被充分捕捉，需調整 ARIMA 的 p、d、q 參數。","D":"殘差的分布特性直接影響預測區間的可靠性和模型的有效性，不可忽視。"}},{"id":40,"question":"下列哪一項最正確地描述了 VAE（Variational Autoencoder）、GAN （Generative Adversarial Network）與擴散模型（Diffusion Model）在多模態潛在空間對齊（Latent Alignment）與生成策略上 的根本差異？","options":{"A":"VAE透過顯式潛在變數建模實現跨模態對齊，適合捕捉整體語意結 構但生成解析度有限；","B":"VAE與Diffusion Ｍodel均屬隱式生成架構，主要依賴對抗式訓 練實現跨模態對齊；","C":"VAE與GAN 均使用馬爾可夫鏈（Markov Chain）進行跨模態轉換；","D":"三者在多模態應用中皆依賴同一潛在表徵空間（Shared Latent Space），僅在解碼器結構不同而已"},"answer":"A","explanations":{"A":"正確（答案為A）。VAE 透過重參數化技巧（Reparameterization Trick）學習連續、結構化的潛在空間，適合生成多樣且可控的樣本；GAN 透過對抗訓練產生高真實感樣本但潛在空間較難解釋；Diffusion Model 透過去噪過程生成高品質樣本，但推論速度較慢。三者各有所長，用途不同。","B":"GAN 使用對抗訓練（生成器vs.判別器），VAE 使用變分推斷最大化 ELBO，Diffusion 模型使用去噪機制，三者訓練目標完全不同。","C":"VAE 使用重採樣潛在空間，GAN 直接學習數據分布，Diffusion 學習去噪過程；VAE 和 GAN 的差異在於是否引入機率分布的顯式建模。","D":"三者在多模態應用中可能使用不同的潛在空間架構，並非共用同一潛在空間。"}},{"id":41,"question":"Space），僅在解碼器結構不同而已 在進行超參數調校（Hyperparameter Tuning）時，若直接在K-Fold 交叉驗證（Cross-Validation）的資料上同時調整模型參數並評估效 能，最可能導致下列哪一種問題？","options":{"A":"模型的交叉驗證結果出現過度樂觀偏差（Over-optimistic Bias），因測試摺資料間接參與參數選擇，造成資料洩漏（Data Leakage）；","B":"模型會在每一摺（Fold）內反覆調整參數，導致訓練不穩與過度 正則化；","C":"因交叉驗證資料被重複使用，造成效能方差增大，無法獲得穩定 估計；","D":"K-Fold 交叉驗證的假設與超參數搜尋相衝突，導致驗證過程失效"},"answer":"A","explanations":{"A":"正確（答案為A）。在超參數調校時使用 K-Fold 交叉驗證選出最佳超參數組合，但每個 fold 都使用了整個資料集的子集，會導致超參數針對整體資料分布過度優化（間接洩漏），這是超參數搜尋和交叉驗證結合時的已知問題，應使用巢狀交叉驗證（Nested CV）解決。","B":"目前描述的超參數調校方法確實存在數據洩漏風險（超參數針對驗證集的分布進行選擇），是性能高估的主要來源。","C":"增加 fold 數量可提升評估穩定性，但不能消除超參數選擇引起的數據洩漏問題。","D":"K-Fold 的假設（各折數據獨立同分布）與超參數搜尋不衝突，但確實存在洩漏問題，應使用巢狀 CV。"}},{"id":42,"question":"若部署一個深度學習模型至金融風控系統，該模型採用鑑別式架構 （如Transformer Classifier）。然而上線後，模型對新樣本的分類 錯誤率顯著上升，經檢查發現，輸入資料分佈已與原訓練集明顯不 同。針對此情形，下列哪一種應對策略最為適合？","options":{"A":"改用生成對抗網路（GAN）生成新樣本並混入訓練集；","B":"改用邏輯迴歸模型（Logistic Regression）以提升穩定性；","C":"增加模型容量（Model Capacity），以學習更多樣本差異；","D":"使用變分自編碼器（VAE）監控潛在空間分佈，偵測輸入資料偏移"},"answer":"D","explanations":{"A":"設定信用評分閾值是模型部署後的業務決策，不是技術上應對鑑別式模型不確定性的最佳做法。","B":"將所有預測信心低的案例轉人工審核可提高安全性，但需要搭配適當的不確定性量化方法（如校準置信度）才能有效識別低信心案例。","C":"對抗訓練能提升模型對輸入擾動的魯棒性，但對於正常輸入的不確定性評估幫助有限。","D":"正確。VAE 能學習訓練資料的潛在分布，當推論時的輸入資料偏離訓練分布（OOD，Out-of-Distribution）時，潛在空間的重建誤差或 KL 散度會異常升高，是偵測輸入偏移的有效方法。"}},{"id":43,"question":"某金融科技公司欲導入 AI模型協助客服郵件自動分類（投訴、詢 問、表揚）。團隊同時考慮兩種模型設計： 方案 A（生成式路徑）：採用 VAE建構潛在語意空間，再結合下游分 類器進行標籤預測； 方案 B（鑑別式路徑）：採用 BERT Classifier 直接根據輸入文本進 行監督式分類。 現有標註資料約 2,000 筆，資料分佈均勻但擴充成本高。若團隊希 望公平比較兩種模型的資料利用效率與泛化能力，下列哪一種實驗設 計最能突顯兩者的本質差異？","options":{"A":"在完整資料集上分別訓練兩者，並比較其分類準確率 （Accuracy）與推論時間；","B":"在低資源情境（Low-resource Setting）下，逐步減少標註比例 （100%、50%、10%），比較其F1-score；","C":"使用GAN 自動生成文本樣本補足資料，觀察兩模型在資料增強後 的精確率（Precision）差異；","D":"在相同訓練資料上固定輸入維度，僅調整模型參數量，比較其對 過擬合的敏感度"},"answer":"B","explanations":{"A":"改變輸入維度（特徵數量）屬於特徵工程的改變，不是用來評估模型容量對過擬合影響的公平比較設置。","B":"正確（答案為B）。為了公平評估模型容量（層數/神經元數）對過擬合的影響，應控制其他所有變量（包括訓練數據），只改變模型的參數量，通過比較訓練誤差和驗證誤差的差距來評估過擬合敏感度。","C":"使用多組不同資料集可能引入資料集差異的干擾因素，無法純粹比較模型容量的影響。","D":"在相同訓練資料上固定輸入維度、僅調整模型參數量，是控制變量實驗的正確設計，但B選項描述更完整。"}},{"id":44,"question":"過擬合的敏感度 某電信公司希望建立一個模型來預測顧客是否即將流失，並進一步模 擬不同促銷或服務策略下顧客的行為變化，以生成多樣化的虛擬樣本 資料進行A/B 測試與行銷策略評估。若要同時兼顧預測與資料生成的 需求，最適合採用下列哪一種方法？","options":{"A":"使用傳統隨機森林（Random Forest）；","B":"使用邏輯迴歸（Logistic Regression）模型；","C":"使用變分自編碼器（Variational Autoencoder, VAE）或生成對 抗網路（Generative Adversarial Network, GAN）；","D":"使用強化學習代理（Reinforcement Learning Agent）"},"answer":"C","explanations":{"A":"分類問題應使用分類器而非迴歸模型；此外 L2 正則化適合減小參數值，但 PCA 降維後的特徵已解決部分共線性問題。","B":"隨機森林可直接處理高維特徵，不需先降維；對解釋性要求不高時是有效選擇。","C":"正確（答案為C）。PCA 降維後，特徵轉為彼此正交（無共線性）的主成分；邏輯迴歸以此為輸入進行分類，模型係數穩定且計算效率高；SHAP 值可解釋主成分對預測的貢獻，滿足可解釋性要求。","D":"強化學習適用於序列決策問題（如遊戲、路由優化），不適用於靜態特徵的二元分類問題。"}},{"id":45,"question":"進行影像分類任務時，研究團隊嘗試利用主成分分析（Principal Component Analysis, PCA）將輸入特徵從 1024維降至100維，並將 降維後的資料輸入支持向量機（Support Vector Machine, SVM）模 型進行訓練。關於此作法，下列哪一項描述最為合理？","options":{"A":"PCA保留的主成分必然能提升 SVM 的分類準確率；","B":"使用原始高維資料通常更能保留資訊，因此 PCA沒有實際意義；","C":"PCA可讓 SVM自動適用於非線性（Nonlinear）資料集；","D":"降維後可降低訓練時間並減少過擬合（Overfitting）風險"},"answer":"D","explanations":{"A":"PCA 是無監督的線性降維方法，不保留類別標籤，應用於分類任務前需搭配分類器；主成分本身沒有分類能力。","B":"降維後的主成分具有不同的解釋方差（第一主成分解釋最多方差），而非均等解釋；且降維不能直接判斷分類邊界。","C":"保留主成分的比例應基於累積解釋方差（如保留 95% 變異），而非固定保留 50%；過少的主成分可能損失重要資訊。","D":"正確。PCA 降維後的主成分保留了原始特徵的主要變異，用於訓練分類器時，能減少高維特徵的計算複雜度並降低過擬合風險；但需注意主成分的可解釋性降低。"}},{"id":46,"question":"某企業的AI 模型已部署於線上服務環境中，用於即時預測顧客流失 機率。近期團隊注意到模型預測準確率逐漸下降，但系統運作正常且 未出現錯誤訊息。經分析發現，近期輸入資料的分布與模型訓練資料 相比出現顯著偏移。若要在 MLOps流程中主動偵測並預警此類問題， 最應採用下列哪項措施？","options":{"A":"建立即時的資料漂移（Data Drift）與概念漂移（Concept Drift）監測機制；","B":"將模型轉換為量化版本以降低延遲；","C":"增加模型超參數調整次數以強化適應性；","D":"使用固定隨機種子（Random Seed）確保訓練穩定"},"answer":"A","explanations":{"A":"正確（答案為A）。為確保部署後的穩定性和可重現性，應使用固定的隨機種子（Random Seed）確保每次訓練結果一致；同時記錄訓練時的特徵列表和類別分布，確保推論時的輸入與訓練時一致。","B":"定期完整重訓可確保模型更新，但不能解決當前已部署模型的一致性問題。","C":"限制預測結果到最常見類別會引入人為偏差，降低模型效用，且不能解決穩定性問題。","D":"使用更複雜的模型可能提升準確率，但增加複雜度不能提升部署穩定性，反而可能增加維護難度。"}},{"id":47,"question":"某金融科技公司導入多任務學習架構，讓單一 Transformer 模型同 時執行OCR（Optical Character Recognition）後的文檔分類以及命 名實體辨識（Named Entity Recognition, NER）任務， 以協助自動歸檔與抽取關鍵金融資訊。在部署初期，團隊發現當模型 的NER準確率（Accuracy）提升時，文檔分類準確率反而下降。若模 型架構正確且資料品質良好，下列哪一項最可能是造成此現象的原 因？","options":{"A":"模型架構無法同時支援文字分類與序列標註任務（Sequence Labeling）；","B":"文檔分類任務不需要語意化表徵（Contextualized Representation）；","C":"損失函數（Loss Function）未進行權重平衡，導致任務間競爭；","D":"所使用的 BERT模型無法支援多任務輸出頭（Multi-Head Outputs）"},"answer":"C","explanations":{"A":"多任務學習（MTL）的優勢在於共享底層 Transformer 的通用表示，各任務共用一個 Encoder，在頂部接不同輸出頭（task-specific heads），理論上能有效共享知識。","B":"使用共享詞向量（word embeddings）是 MTL 的基礎設計，但更重要的是透過共享 Transformer 層捕捉通用語義表示。","C":"正確（答案為C）。多任務學習模型在任務間目標不一致（如信用風險偏好穩定性而客服意圖需敏感性）時，可能出現「負遷移」（Negative Transfer），各任務相互干擾導致整體表現不如單任務模型；需透過任務加權、梯度調整等技術緩解。","D":"標準 BERT 模型支援多任務輸出頭，只需在 [CLS] Token 上方接不同的全連接層即可，這是 MTL 的標準實現方式。"}},{"id":48,"question":"Outputs） 某數據工程師使用 DBSCAN演算法對一份數百萬筆的高維顧客資料進 行聚類分析，但發現程式執行速度極慢，甚至出現記憶體不足的情 況。若要在不改變演算法核心邏輯的前提下，最有效提升其運算效率 的作法為何？","options":{"A":"改用以平均連結（Average Linkage）為基礎的階層式群集法 （Hierarchical Clustering）；","B":"採用高效率的距離索引結構（Distance Index Structure），例如 KD-Tree 或 Ball Tree；","C":"將 ε（Epsilon）參數調得極小，以減少鄰近點的數量；","D":"在資料前處理時增加標準化後的特徵維度數"},"answer":"B","explanations":{"A":"高維特徵空間中 DBSCAN 面臨「維度詛咒」，使得歐式距離失去區分能力，是高維空間中 DBSCAN 效果變差的主要原因。","B":"正確（答案為B）。高維空間中所有點的距離趨於相等（維度詛咒），使 ε 難以有效區分核心點和雜訊；解決方案包括先用 PCA/t-SNE 降維後再應用 DBSCAN，或改用可處理高維數據的算法（如 HDBSCAN）。","C":"增加樣本數量可能有助於改善稀疏性，但無法根本解決維度詛咒問題。","D":"在資料前處理時增加標準化後的特徵維度數量（如 PCA 後保留更多主成分）反而加劇高維問題，不是正確的改善方向。"}},{"id":49,"question":"某電商平台導入 AI情感分析模型，用以自動偵測顧客評論中的負面 情緒並觸發客服機制。然而，上線後發現模型在面對不同語言或族群 書寫風格的評論時表現不一致，例如部分語氣強烈的正面評論被誤判 為負面，而禮貌但含批評意圖的評論卻被判為中性。若從技術與資料 治理的角度分析，下列哪一項描述不正確？","options":{"A":"模型未啟用詞嵌入正規化（Embedding Normalization）可能造成 語意距離不穩定，導致預測誤差；","B":"訓練語料若偏向特定文化或語氣特徵，可能使模型產生內隱偏誤 （Implicit Bias）；","C":"模型若訓練資料來源不平衡，容易導致對不同語言或族群風格的 情緒判斷不準確；","D":"Transformer 架構能捕捉上下文語意，但若訓練資料偏差仍存在， 模型仍可能學習到偏誤判斷"},"answer":"A","explanations":{"A":"使用預定義規則（Rules-based）可確保特定偏見類型不出現，但無法覆蓋所有邊緣案例，且維護成本高。","B":"使用公正性約束（Fairness Constraints）能在訓練時直接優化公平性指標（如人口統計同等性），是更根本的解決方案。","C":"對抗去偏（Adversarial Debiasing）能有效減少模型對敏感屬性（如性別）的依賴，是先進的去偏技術。","D":"正確（答案為A，即D選項描述的Transformer）。Transformer 架構能捕捉上下文語意，但若訓練數據本身包含偏見（如帶有性別刻板印象的評論），模型仍會學習並複製這些偏見，因此架構選擇不能解決數據偏見問題。"}},{"id":50,"question":"模型仍可能學習到偏誤判斷 某設計師使用公司內部建置的生成式 AI工具製作行銷素材，並輸入 提示語（Prompt）：「請生成一張模特兒手持品牌飲料、背景為海邊夕 陽的照片」。系統能正確生成主要主題與場景，但輸出的圖像中，品 牌標誌顏色常有誤差，或人物手部姿勢顯得不自然。若從多模態生成 模型的技術機制分析，此現象最可能是下列哪一項原因所造成？","options":{"A":"擴散式生成模型的去雜訊過程出現隨機梯度漂移，導致影像像素 錯誤；","B":"提示語過長造成 Transformer 的位置編碼超出上下文限制，導致 生成混亂；","C":"CLIP 模型中的文字編碼器與影像編碼器在語意嵌入空間未充分對 齊，導致跨模態理解偏差；","D":"模型未採用對比學習（Contrastive Learning）損失函數，無法 建立多模態語意關聯"},"answer":"C","explanations":{"A":"使用更大的 CLIP 模型能提升圖文對齊能力，但問題的根源是視覺與語言特徵的多模態融合，單純放大單一模態的模型不夠。","B":"增加更多圖文配對數據能改善對齊，但不能解決特徵融合架構不足的問題。","C":"增加圖像解析度能提供更豐富的視覺細節，有助於提升準確度，但不能從根本解決跨模態特徵融合不足的問題。","D":"正確（答案為C）。對比學習（Contrastive Learning）透過拉近正樣本（相關圖文對）並推開負樣本（不相關對）的損失函數，能有效建立圖像和文字特徵在同一潛在空間的對齊關係，是多模態學習的核心機制。"}}] },
  { name: '科三', questions: [{"id":1,"question":"上，是否仍能維持穩定的預測表現。資料科學團隊計畫利用統計方法檢驗 模型對未觀察資料的適應能力與泛化效果。下列哪一種方法最適合用於此 目的？","options":{"A":"F檢定（F-test）；","B":"交叉驗證（Cross-Validation）；","C":"配對樣本t 檢定（Paired-sample t-test）；","D":"卡方檢定（Chi-square Test）"},"answer":"B","explanations":{"A":"F 檢定（F-test）用於比較多個組別的方差，或測試迴歸模型的整體顯著性，不直接評估模型的泛化能力。","B":"正確。交叉驗證（如 K-Fold）通過將資料切分為多組訓練/驗證集，系統性評估模型在未見資料上的泛化表現，是評估模型穩定性的黃金標準。","C":"配對樣本 t 檢定用於比較同一組受試者在兩種條件下的均值差異，不適用於評估預測模型的泛化效果。","D":"卡方檢定（Chi-square Test）用於分析類別變數之間的獨立性，不適用於迴歸模型的泛化評估。"}},{"id":2,"question":"在建立迴歸或分類模型時，若希望避免模型過度擬合（Overfitting），可 透過加入正則化項以限制模型的複雜度。其中，L1正則化（Lasso）的主 要效果為何？","options":{"A":"增加模型參數的數量，以提升表現靈活度；","B":"強化梯度穩定性，避免參數更新過度震盪；","C":"產生稀疏模型（Sparse Model），使部分參數權重收斂為零；","D":"提高學習率（Learning Rate），加速模型收斂速度"},"answer":"C","explanations":{"A":"增加模型參數會提升模型複雜度，可能加重過擬合，與正則化的目的相反。","B":"梯度穩定性由批次正規化（Batch Normalization）或梯度裁剪（Gradient Clipping）處理，不是 L1 正則化的效果。","C":"正確。L1 正則化（LASSO）對損失函數加入參數絕對值之和的懲罰項，優化過程中會將部分不重要的特徵係數精確收斂至 0，產生稀疏模型，具有自動特徵選擇的效果。","D":"L1 正則化不影響學習率，學習率是梯度下降的步長超參數，兩者獨立。"}},{"id":3,"question":"在訓練非線性模型時，若目標函數為非凸函數（Non-convex Function）， 演算法在參數更新過程中可能出現多個極值點，導致最佳化結果不穩定。 請問此時最可能發生下列哪一種情況？","options":{"A":"梯度消失；","B":"資料過少；","C":"局部最優解；","D":"過擬合"},"answer":"C","explanations":{"A":"梯度消失（Vanishing Gradient）是深層網路在反向傳播時梯度趨近零的問題，通常發生在非常深的網路中，而非直接由非凸函數導致。","B":"資料量不足是過擬合的原因，與非凸函數的最佳化問題無關。","C":"正確。非凸函數具有多個局部極小值（Local Minima）和鞍點（Saddle Points）。梯度下降演算法可能在找到全局最優解之前就收斂到局部最優解，導致最佳化結果不穩定。","D":"過擬合（Overfitting）是模型對訓練集的記憶過強，與目標函數的凸性無關。"}},{"id":4,"question":"在執行 DBSCAN（Density-Based Spatial Clustering of Applications with Noise）群集分析時，若某資料點鄰域內的樣本數不足以形成核心點 （Core Point），且該點未被任何核心點的鄰域所包含，也未與其他群集形 成密度可達關係（Density Reachability），此資料點最終將被歸類為哪一 種類型？","options":{"A":"鄰近點（Neighbor Point）；","B":"雜訊點（Noise Point）；","C":"邊界點（Border Point）；","D":"潛在點（Potential Point）"},"answer":"B","explanations":{"A":"鄰近點（Neighbor Point）不是 DBSCAN 的標準術語；DBSCAN 只有核心點、邊界點和雜訊點三種類型。","B":"正確。若一個數據點既不是核心點（鄰域內樣本數少於 MinPts），也不在任何核心點的鄰域內（無法達到密度可達），則該點被分類為雜訊點（Noise Point），也稱為離群點（Outlier）。","C":"邊界點（Border Point）是非核心點但在某核心點鄰域內的點，此數據點不在任何核心點的鄰域內，不是邊界點。","D":"潛在點（Potential Point）不是 DBSCAN 的標準術語，DBSCAN 不存在此類別。"}},{"id":5,"question":"某智慧製造公司開發一套影像辨識系統，用於自動檢測生產線上的瑕疵產 品。系統採用卷積神經網路（Convolutional Neural Network, CNN）作為 主要模型架構，其中第一層卷積層（Convolutional Layer）主要負責的功 能為下列何者？","options":{"A":"自動提取輸入影像中的局部特徵；","B":"降低影像維度以加速運算效率；","C":"增加神經元與參數數量以提升模型容量；","D":"整合所有特徵並輸出最終分類結果"},"answer":"A","explanations":{"A":"正確。CNN 第一層卷積層透過卷積核（filter）在輸入影像的小區域（局部感受野）滑動，提取邊緣、紋理等低階局部特徵，這是 CNN 的基礎視覺特徵提取機制。","B":"降低影像維度（減少特徵圖大小）主要由池化層（Pooling Layer）負責，而非第一層卷積層。","C":"增加神經元和參數數量不是卷積層的主要目的；相反，CNN 透過參數共享機制顯著減少參數量。","D":"整合所有特徵並輸出分類結果是全連接層（Fully Connected Layer）的功能，位於 CNN 的末端。"}},{"id":6,"question":"某智慧城市團隊開發一套交通監控系統，用於即時辨識路口監視器影像中 的車輛與行人。團隊比較後發現，卷積神經網路（Convolutional Neural Network, CNN）在訓練與推論效率上，明顯優於傳統的全連接神經網路 （Fully Connected Neural Network, FCNN）。請問下列何者為主要原因？","options":{"A":"CNN 能自動學習影像的旋轉與比例不變性；","B":"CNN 可直接跳過人工特徵提取步驟進行分類；","C":"CNN 透過區域感知（Local Receptive Field）與參數共享（Parameter Sharing）機制，降低模型參數量與運算複雜度；","D":"CNN 捨棄激勵函數（Activation Function），以加快運算速度"},"answer":"C","explanations":{"A":"CNN 學習旋轉和比例不變性（Invariance）主要透過資料增強和池化層，而非 CNN 架構本身的固有特性。","B":"CNN 仍然可以（且通常需要）搭配人工特徵提取；CNN 的優勢在於能自動學習特徵，但並非完全跳過特徵工程。","C":"正確。CNN 透過區域感知（Local Receptive Field）讓每個神經元只連接局部輸入，以及參數共享（同一卷積核在整個特徵圖上重用），大幅減少參數量和計算複雜度，相比全連接層效率更高。","D":"CNN 保留並使用激活函數（如 ReLU）引入非線性；去掉激活函數會使網路退化為線性模型，完全不正確。"}},{"id":7,"question":"下列哪一種應用最適合採用長短期記憶網路（Long Short-Term Memory, LSTM）模型？","options":{"A":"預測未來七天的電力需求變化趨勢；","B":"辨識監視影像中不同類別的物件；","C":"將大量顧客資料依相似特徵自動分群；","D":"將高維度的感測器資料壓縮成低維表示"},"answer":"A","explanations":{"A":"正確。LSTM 透過門控機制（輸入門、遺忘門、輸出門）能長期記憶時序依賴關係，適合預測電力需求這類有長期季節性趨勢和短期波動的時序預測任務。","B":"辨識監視影像中的物件是物件偵測（Object Detection）任務，適合使用 YOLO 或 Faster R-CNN 等 CNN 架構，不需要 LSTM 的時序建模能力。","C":"顧客資料分群是無監督學習的聚類問題，適合 K-means 或 DBSCAN，LSTM 是監督式序列模型，不適用。","D":"高維感測器資料壓縮是降維問題，適合 PCA 或自編碼器（Autoencoder），不是 LSTM 的應用場景。"}},{"id":8,"question":"資訊增益（Information Gain）常用於衡量特徵對分類結果的不確定性貢 獻程度，並據以進行特徵選擇。此方法主要應用於下列哪一類模型架構 中？","options":{"A":"使用 L1 正則化進行特徵篩選的線性模型；","B":"利用激活函數（Activation Function）進行特徵擷取的深度神經網 路；","C":"透過核函數（Kernel Function）將特徵映射至高維空間的分類模型；","D":"透過遞迴分裂方式建立分類規則的決策樹模型"},"answer":"D","explanations":{"A":"L1 正則化確實進行特徵篩選，但它是線性模型的一部分，不是資訊增益的應用場景；資訊增益是基於熵的分裂準則。","B":"深度神經網路使用反向傳播和激活函數學習特徵，不使用資訊增益進行特徵選擇（資訊增益無法在連續反向傳播中直接使用）。","C":"SVM 使用核函數映射特徵至高維空間，依據最大間隔（Maximum Margin）分類，不使用資訊增益。","D":"正確。決策樹透過遞迴分裂建立分類規則，在每個節點選擇能最大化資訊增益（Information Gain = 父節點熵 - 子節點加權熵）的特徵進行分裂，資訊增益是決策樹分裂準則的核心。"}},{"id":9,"question":"在建構以距離為基礎的機器學習模型（如 KNN、SVM）時，下列哪一項資料 前處理方式最為關鍵？","options":{"A":"進行特徵縮放（Feature Scaling），使各特徵變數具有相似的數值範 圍；","B":"將連續型特徵變數轉換為類別型變數；","C":"以平均值或中位數進行缺失值補齊；","D":"進行隨機抽樣以平衡資料筆數"},"answer":"A","explanations":{"A":"正確。KNN 和 SVM 都是基於距離的算法。若特徵值的數值範圍差異懸殊（如年齡 0-100 vs. 收入 0-100萬），距離計算會被大數值特徵主導，導致預測偏差。特徵縮放（標準化或最大最小正規化）能消除量綱差異。","B":"將連續特徵轉為類別型（離散化）會損失數值精度，且通常降低模型性能，不是距離模型的必要前處理。","C":"缺失值填補是必要的數據清洗步驟，但對距離模型而言，特徵縮放比缺失值填補更關鍵（前者直接影響距離計算）。","D":"隨機抽樣用於處理類別不平衡問題，不是距離模型最關鍵的前處理步驟。"}},{"id":10,"question":"下列哪一種應用情境最適合導入 AutoML，以提升模型開發效率？","options":{"A":"公司已有完整的 MLOps 平台與資深資料科學團隊，模型更新採固定流 程；","B":"製造部門的生產良率模型已長期穩定運作，只需定期調整參數；","C":"行銷部門希望在短時間內比較多種顧客流失預測模型，缺乏專職工程師 與時間進行手動建模；","D":"財務部門正在開發高度客製化的信用風險評估模型，需要精細控制特徵 工程與演算法細節"},"answer":"C","explanations":{"A":"已有完整 MLOps 平台和資深團隊時，手動建模能更精確控制模型品質，AutoML 的優勢並不明顯。","B":"長期穩定運作的模型定期調參用手動方式更可控，AutoML 對此場景效益有限。","C":"正確。AutoML 最適合缺乏專職數據科學家且需要快速比較多種模型的場景。它能自動化特徵工程、模型選擇和超參數調整，讓非專業人員在短時間內獲得高品質的基準模型。","D":"高度客製化的信用風險評估需要精細控制（如加入業務規則、可解釋性要求），AutoML 的自動化流程難以滿足此類複雜需求。"}},{"id":11,"question":"工程與演算法細節 相較於Grid Search，Random Search 在超參數調整上具備哪一項主要優 勢？","options":{"A":"可自動產生模型架構；","B":"可使用更大的訓練集；","C":"避免模型過擬合；","D":"能更有效率搜尋高維參數空間"},"answer":"D","explanations":{"A":"AutoML 自動生成模型架構，與超參數搜尋不同；Random Search 不具備架構搜尋功能。","B":"訓練集大小由資料量決定，與搜尋方法無關；Random Search 和 Grid Search 使用相同的訓練集。","C":"Random Search 和 Grid Search 都面臨相同的過擬合風險，搜尋方法本身不決定是否過擬合。","D":"正確。Grid Search 需要評估所有參數組合（指數級增長），在高維參數空間效率極低；Random Search 隨機採樣參數組合，研究顯示在有限預算下，Random Search 在高維空間的搜尋效率顯著優於 Grid Search（因為不同超參數對性能的影響程度不同）。"}},{"id":12,"question":"某智慧製造公司開發一套設備故障預測系統，利用感測器資料訓練深度神 經網路（Deep Neural Network, DNN）模型，以提前偵測異常運作跡象。 在訓練過程中，團隊發現模型收斂速度不穩定：有時過快導致過擬合，有 時又遲遲無法達到最佳準確率。開發團隊可以藉由調整下列哪一項超參數 （Hyperparameter）以改善此問題？","options":{"A":"每個神經元的輸出結果；","B":"損失函數（Loss Function）在訓練過程中的梯度變化值（Gradient）；","C":"學習率（Learning Rate），控制模型權重更新的速度；","D":"模型在訓練後產生的權重值"},"answer":"C","explanations":{"A":"每個神經元的輸出結果是前向傳播的計算值，不是超參數，不能直接調整。","B":"梯度變化值是反向傳播的計算結果，不是可以事先設定的超參數。","C":"正確。學習率（Learning Rate）控制每次梯度更新時模型權重改變的幅度。學習率過大導致訓練不穩定（loss 震盪或發散），過小則收斂緩慢；透過學習率調度（如 ReduceLROnPlateau）可解決收斂不穩定問題。","D":"訓練後產生的權重值是模型參數（Parameters），不是超參數（Hyperparameters）；超參數需在訓練前設定。"}},{"id":13,"question":"標籤偏差(Label Bias)通常是因為什麼原因造成？","options":{"A":"訓練資料量過大；","B":"標記資料本身帶有主觀偏見；","C":"模型結構設計不當；","D":"特徵數量設定過多"},"answer":"B","explanations":{"A":"訓練資料量過大不是標籤偏差的原因，大量高品質的標記數據通常能減少偏差。","B":"正確。標籤偏差（Label Bias）通常源於標記過程中標記者的主觀偏見，如標記者對某些類別有不同的判斷標準、受文化背景影響等，導致標籤不一致或系統性偏差。","C":"模型結構不當可能導致欠擬合或過擬合，但不會直接引起標籤偏差（標籤在訓練前已確定）。","D":"特徵數量設定過多可能導致維度詛咒或過擬合，但與標籤數據的標記偏差無關。"}},{"id":14,"question":"下列哪一種AI 應用情境中，模型的可解釋性（Explainability）最為關 鍵？","options":{"A":"電商平台利用深度學習模型預測用戶的下一次購買時間，以優化推播行 銷策略；","B":"新創公司使用機器學習演算法自動調整廣告出價策略，以提升點擊轉換 率；","C":"醫院導入AI 模型分析病患影像並給出腫瘤惡性可能性，作為臨床醫師 診斷依據；","D":"銀行導入AI 模型預測客戶流失率，並自動推薦留客優惠方案"},"answer":"C","explanations":{"A":"電商購買時間預測屬於商業優化問題，可解釋性需求相對較低，因為錯誤決策的代價較小且可快速調整。","B":"廣告出價策略優化也是商業應用，可解釋性有一定需求，但相較於醫療決策仍較低。","C":"正確。醫療影像診斷的 AI 模型輔助臨床決策，涉及患者安全和生命健康。醫師需要理解模型判斷腫瘤惡性可能性的依據（如哪些影像特徵支持判斷），才能做出可信賴的診斷決策，因此可解釋性在此場景最為關鍵。","D":"銀行客戶流失預測雖然有一定的可解釋性需求（監管合規、留客策略），但風險程度低於醫療決策。"}},{"id":15,"question":"在線性迴歸模型中，若 R²值為 0.85，其意義為何？","options":{"A":"模型準確率為 85%；","B":"85%的變異可被模型解釋；","C":"預測誤差為 15%；","D":"模型有85%的信心水準"},"answer":"B","explanations":{"A":"R² 是決定係數（Coefficient of Determination），不等於模型準確率；準確率是分類模型的指標，迴歸模型沒有「準確率」。","B":"正確。R² = 0.85 表示模型能解釋目標變數（房價）85% 的變異（Variance），即模型捕捉了數據中 85% 的規律性，剩餘 15% 為模型無法解釋的隨機誤差或其他因素。","C":"預測誤差應由 RMSE、MAE 等指標衡量；R² = 0.85 不能直接解讀為誤差 15%。","D":"R² 是描述性統計量，不涉及信心水準（Confidence Interval），信心水準是統計推斷的概念。"}},{"id":16,"question":"在二元分類問題中，若精確率（Precision）為0.8，召回率（Recall）為 0.6，則F1分數（F1 Score）為何？","options":{"A":"0.686；","B":"0.700；","C":"0.720；","D":"0.750"},"answer":"A","explanations":{"A":"正確。F1 = 2×P×R/(P+R) = 2×0.8×0.6/(0.8+0.6) = 0.96/1.4 ≈ 0.686（調和平均數，對低值更敏感，結果介於 P 和 R 之間但偏向較低值）。","B":"0.700 是算術平均值 (0.8+0.6)/2，但 F1 使用調和平均數（Harmonic Mean），結果應低於算術平均值。","C":"0.720 不是正確計算結果；2×0.8×0.6 = 0.96，0.96/(0.8+0.6) = 0.686。","D":"0.750 也是錯誤計算；可能混淆了計算公式。"}},{"id":17,"question":"下列哪一種優化演算法內建動量（Momentum）的設計機制？","options":{"A":"SGD+Momentum；","B":"Adam；","C":"RMSProp；","D":"Adagrad"},"answer":"B","explanations":{"A":"SGD+Momentum 是在標準 SGD 基礎上手動添加動量項，Momentum 不是 SGD 的內建設計，需要額外指定。","B":"正確。Adam（Adaptive Moment Estimation）優化器內建一阶動量（Momentum，追蹤梯度的移動平均）和二階動量（追蹤梯度平方的移動平均），同時具備自適應學習率調整能力，是最常用的現代優化器。","C":"RMSProp 維護梯度平方的移動平均來自適應調整學習率，但不包含一階動量（Momentum）的設計。","D":"Adagrad 根據歷史梯度的累積平方和調整學習率，學習率單調遞減，不包含動量機制，且後期學習率可能過小。"}},{"id":18,"question":"下列何者最能同時反映 XGBoost（eXtreme Gradient Boosting）相較於傳 統梯度提升決策樹（Gradient Boosting Decision Tree, GBDT）的主要技 術改進？","options":{"A":"引入正則化項（Regularization）以抑制過擬合，並支援缺失值自動處 理與並行化訓練；","B":"改以隨機森林（Random Forest）架構取代樹模型以提升準確率；","C":"以類神經網路（Neural Network）取代弱分類器（Weak Learners）；","D":"採用批次正規化（Batch Normalization）技術提升模型穩定性"},"answer":"A","explanations":{"A":"正確。XGBoost 相較於傳統 GBDT 的主要改進包括：(1) 在損失函數中加入 L1/L2 正則化項，防止過擬合；(2) 能自動處理缺失值（透過學習最優分裂方向）；(3) 支援列取樣（列采样/column subsampling）和並行化訓練（每層樹的最優分裂可並行計算），大幅提升訓練效率。","B":"XGBoost 仍使用決策樹作為弱分類器（Weak Learners），並非改用隨機森林架構；兩者在基礎模型選擇上相同，XGBoost 的改進在於訓練機制和正則化。","C":"XGBoost 的弱分類器仍是決策樹，並非神經網路；將弱分類器改為神經網路是不同的研究方向（如 Neural Boosting）。","D":"批次正規化（Batch Normalization）是深度神經網路的技術，XGBoost 是基於決策樹的集成模型，不使用批次正規化。"}},{"id":19,"question":"某醫療機構開發疾病早期偵測模型，正樣本（確診病例）僅佔 3%。在模型 訓練與評估過程中，下列哪一種作法最不適合用於提升對少數類病例的預 測能力？","options":{"A":"使用SMOTE 過採樣；","B":"調整類別權重；","C":"使用準確率（Accuracy）作為評估指標；","D":"欠採樣多數類(Undersampling the majority class)"},"answer":"C","explanations":{"A":"SMOTE（Synthetic Minority Over-sampling Technique）生成合成少數類樣本，有助於平衡資料分布，是處理不平衡資料的有效方法。","B":"調整類別權重（Class Weights）讓模型在損失函數中對少數類給予更高懲罰，是處理類別不平衡的常用方法。","C":"正確（即最不適合）。當正樣本僅佔 3% 時，即使模型將所有樣本預測為負類，準確率仍高達 97%；使用準確率作為評估指標會造成嚴重誤導，無法真實反映模型對少數類（確診病例）的偵測能力，應改用 F1-score、AUC-PR 或 Recall。","D":"資料增強（Data Augmentation）可擴充少數類的訓練樣本，特別對影像等高維數據有效，是合適的處理方式。"}},{"id":20,"question":"某電子商務公司為開發商品評論情感分析模型，希望模型能捕捉評論中不 同特徵之間的關聯影響，例如「商品價格」與「顧客滿意度」的互動效 果。下列哪一種特徵工程設計方式最適合用於建立互動特徵（Interaction Features）？","options":{"A":"將單一特徵取平方；","B":"對所有特徵進行對數轉換；","C":"將兩個或多個特徵進行乘積或交互組合；","D":"對特徵進行標準化"},"answer":"C","explanations":{"A":"簡單 RNN 在長距離依賴問題上表現較差，且對情感反轉（如否定詞）等上下文關係的捕捉能力不足。","B":"TF-IDF 是基於詞頻統計的方法，無法理解詞序和上下文語義，對雙關語和諷刺等複雜語言現象的處理能力有限。","C":"正確（答案為C）。評論中存在雙關語、諷刺等複雜語義時，預訓練語言模型（如 BERT）能透過雙向上下文理解捕捉細微語義差異；同時，不同領域的評論（電子產品 vs. 餐廳）語言風格差異大，預訓練模型的遷移學習能力能有效適應各領域特徵。","D":"對特徵進行標準化是數值特徵的前處理步驟，對文本分類任務的語義理解幫助有限。"}},{"id":21,"question":"某語音辨識系統開發團隊採用 Transformer 架構，為了讓模型能同時理解 語音片段中的發音特徵、語速變化與語意脈絡等多層次資訊，團隊在設計 中導入了多頭注意力（Multi-head Attention）機制。請問下列何者為此 機制的主要優點？","options":{"A":"減少模型參數量以降低訓練成本；","B":"加速整體注意力計算過程；","C":"從不同表示子空間（Representation Subspaces）同時捕捉多樣化關聯 資訊；","D":"避免梯度消失（Gradient Vanishing）問題"},"answer":"C","explanations":{"A":"增加更多的注意力頭（Heads）能讓模型從更多子空間捕捉關聯，但不能解決同一個位置的詞無法同時「看到」過去和未來位置詞的問題。","B":"使用相對位置編碼（Relative Positional Encoding）能更好地建模詞語間的相對距離，但雙向理解需要架構層面的改變，不只是位置編碼的選擇。","C":"正確（答案為C）。標準 Transformer 的 Encoder 使用雙向自注意力，每個位置都能同時關注所有其他位置；而 Decoder 使用帶遮罩的自注意力（Masked Self-Attention），只能看到已生成的詞，防止未來資訊洩漏。對語音辨識的語義理解需要雙向上下文，使用 Encoder 部分更合適。","D":"避免梯度消失主要透過殘差連接（Residual Connection）和層正規化（Layer Norm）實現，與自注意力方向性無關。"}},{"id":22,"question":"某電商平台希望預測顧客是否會購買特定商品。系統蒐集顧客的瀏覽紀 錄、停留時間、商品類別偏好與過去購買行為，並以此推估「在觀察到這 些行為特徵的情況下，該顧客會購買的機率」。若模型採用貝氏定理 （Bayes’Theorem）進行推論，下列敘述何者最符合其核心運作機制？","options":{"A":"根據歷史樣本自動分群，找出行為相似的顧客群；","B":"以條件機率方式計算顧客屬於「會購買」或「不會購買」的分類機率；","C":"以最小平方誤差（Mean Squared Error）為損失函數，預測顧客的購買 金額；","D":"依據回饋信號（Feedback Signal）透過強化學習（Reinforcement Learning）動態調整推薦策略"},"answer":"B","explanations":{"A":"根據歷史樣本分群找相似顧客是聚類（Clustering）的做法，不直接計算購買機率的條件機率。","B":"正確。貝氏定理的核心是計算後驗機率 P(購買|行為特徵) = P(行為特徵|購買)×P(購買)/P(行為特徵)，即在觀察到顧客行為特徵的條件下，計算其屬於「會購買」類別的條件機率，這是貝氏分類器（Naive Bayes Classifier）的核心運作機制。","C":"預測購買金額是迴歸問題，以 MSE 為損失函數；貝氏定理此處用於分類問題（買或不買）。","D":"強化學習動態調整推薦策略是另一種推薦系統設計方式，不是貝氏定理的應用。"}},{"id":23,"question":"Learning）動態調整推薦策略 一家再生能源公司希望預測未來三個月太陽能發電量的波動範圍。由於氣 候條件具有高度隨機性，且輸入變數（如日照時數、雲量、溫度）之間存 在不確定關係，工程團隊決定以隨機抽樣方式模擬多種可能情境，以估算 整體發電量的機率分佈與風險區間。請問此時所採用的技術最符合下列哪 一種方法？","options":{"A":"蒙地卡羅方法（Monte Carlo Method）；","B":"K-means聚類（K-means Clustering）；","C":"支持向量迴歸（Support Vector Regression, SVR）；","D":"特徵選取（Feature Selection）"},"answer":"A","explanations":{"A":"正確。蒙地卡羅方法（Monte Carlo Method）透過大量隨機模擬（抽樣）來估算確定性問題的解，特別適合高度隨機且難以解析的系統。此場景中用隨機抽樣模擬氣候條件，估算太陽能發電量的機率分布，是 Monte Carlo 的典型應用。","B":"K-means 是聚類算法，用於將相似樣本分組，不適用於估算機率分布或風險區間。","C":"SVR 是監督式迴歸模型，能預測單一數值，但不能直接估算整體的機率分布和風險區間。","D":"特徵選取是數據前處理步驟，不能解決發電量預測的不確定性估算問題。"}},{"id":24,"question":"某房地產公司利用多元迴歸模型（Multiple Regression Model）預測房 價，並繪製殘差圖（Residual Plot）檢查模型品質。結果顯示部分資料點 的殘差極大，且在高價區樣本中出現系統性彎曲分佈現象。根據此觀察， 下列何者為最可能的正確解釋？","options":{"A":"模型過度擬合（Overfitting），導致在訓練資料上表現過好、泛化能力 不足；","B":"模型特徵數量不足，導致欠擬合（Underfitting）；","C":"模型存在異常值（Outlier）或非線性關係，違反迴歸假設；","D":"殘差圖呈現隨機分佈，表示模型已完全符合所有假設"},"answer":"C","explanations":{"A":"模型過擬合通常表現為訓練準確率高但驗證誤差大，不會在特定數值範圍（高價區）出現系統性彎曲。","B":"高標準差（預測值散布廣）說明不確定性大，但不能解釋殘差在高價區的系統性彎曲現象。","C":"正確。高價區殘差呈系統性彎曲表明線性迴歸的線性假設不成立（Assumption Violation），高價房屋的價格影響因素可能存在非線性關係（如位置溢價的加乘效果），應考慮加入多項式特徵或使用非線性模型。同時，極端大的殘差可能指向異常值（Outliers）的存在。","D":"類別不平衡是分類問題的概念，在迴歸任務中不適用；殘差的彎曲分布更可能是模型假設違反問題。"}},{"id":25,"question":"某金融機構正在建立傳統信用評分卡模型，採用邏輯迴歸（Logistic Regression）作為建模方法，並依循監理機關建議的標準化流程進行模型 開發。下列哪一項不是傳統信用評分卡模型開發流程中的常見步驟？","options":{"A":"使用生成式模型進行特徵學習；","B":"進行特徵選擇與多重共線性（Multicollinearity）分析；","C":"進行分箱（Binning）與資訊值（Information Value, IV）檢定；","D":"使用樣本穩定性指標（Population Stability Index, PSI）檢驗模型 穩定性"},"answer":"A","explanations":{"A":"PSI（Population Stability Index）用於監控特徵分布隨時間的穩定性，是偵測資料漂移（Data Drift）的工具；此題問的是評估模型是否過擬合，應使用驗證集評估。","B":"使用相同訓練集交叉驗證（CV）後再測試是正確的模型評估方法，能有效評估泛化能力；但選項描述需確認是否包含適當的驗證集設計。","C":"在訓練集上測試意味著評估的是訓練誤差而非泛化能力，無法有效識別過擬合（過擬合模型在訓練集上表現完美，在新數據上表現差）。","D":"正確（答案為A對應此情境）。使用獨立的測試集（Holdout Set）評估模型，並搭配 PSI 檢驗訓練集和測試集的特徵分布差異，能有效評估模型的穩定性和泛化能力，是防止過擬合的標準做法。"}},{"id":26,"question":"穩定性 在防止監督式學習模型過擬合（Overfitting）時，下列哪一種策略不屬於 降低模型複雜度或限制學習能力的作法？","options":{"A":"採用L1或L2 正則化；","B":"在訓練過程中使用 Dropout 技術；","C":"採取早期停止（Early Stopping）機制；","D":"擴增輸入特徵變數以提升模型表達能力"},"answer":"D","explanations":{"A":"選用線性激活函數（Linear Activation）等同於不使用激活函數，整個神經網路退化為一個線性變換，無法學習非線性特徵。","B":"增加網路層數（Layer Depth）而不解決線性激活問題，只會加重「無非線性表達能力」的問題。","C":"減少隱藏層神經元數量可能導致欠擬合（模型容量不足），無法修正激活函數的問題。","D":"正確。ReLU（Rectified Linear Unit）是最常用的非線性激活函數，計算簡單（max(0,x)）、不存在梯度消失問題（對正值梯度為1），替換線性激活函數能讓神經網路獲得非線性表達能力，大幅提升模型的擬合能力。"}},{"id":27,"question":"某智慧製造團隊在開發瑕疵影像檢測模型時，發現使用線性激活函數 （Activation Function）後，模型的訓練準確率長期停滯，懷疑模型無法 學習到足夠複雜的特徵表達。若要改善此問題，下列哪一項調整方案最為 合適？","options":{"A":"增加卷積層（Convolutional Layer）數量，使網路更深以強化特徵提 取；","B":"將輸入影像先進行灰階化處理，降低運算量；","C":"使用Sigmoid 激活函數，以將輸出壓縮至[0,1]範圍；","D":"改用ReLU（Rectified Linear Unit）激活函數，以引入非線性並提升 模型表達能力"},"answer":"D","explanations":{"A":"邏輯迴歸（Logistic Regression）輸出機率值，適用於二元分類（如流失/不流失），能提供客戶流失的機率預測。","B":"SVM（Support Vector Machine）適用於高維分類問題，但對大規模數據的計算效率較低，且可解釋性不如邏輯迴歸。","C":"KNN（K-Nearest Neighbors）是惰性學習算法，不產生明顯的特徵重要性分數，無法直接識別影響流失的關鍵因素。","D":"正確（答案為D）。梯度提升決策樹（如 XGBoost、LightGBM）具有內建的特徵重要性計算，能識別影響顧客流失的關鍵特徵，同時保持高預測準確率；搭配 SHAP 值還能提供可解釋的個別預測解釋，滿足業務洞察需求。"}},{"id":28,"question":"模型表達能力 一家零售電商公司希望建立顧客流失預測模型，用以判斷哪些會員可能在 三個月內不再消費。團隊以去年會員資料進行訓練，並僅採用「曾經購買 三次以上」的活躍顧客紀錄作為樣本。模型上線後，對整體會員進行預測 時，發現模型對於新註冊會員與低消費會員的預測準確率明顯偏低。下列 何者為造成此現象最可能的原因？","options":{"A":"特徵設計未排除與會員忠誠度高度相關的變數，導致特徵偏差 （Feature Bias）；","B":"標記（Label）由人工標註，導致標籤偏差（Label Bias）；","C":"訓練樣本僅涵蓋高活躍顧客，造成取樣偏差（Sampling Bias）；","D":"模型未進行超參數調整，導致過擬合（Overfitting）"},"answer":"C","explanations":{"A":"模型在訓練集和驗證集上表現均差（欠擬合）時，使用更複雜的模型（如深度神經網路）是正確方向；但此處題目描述的是特定故障類型數量不足（資料不平衡），不是模型容量問題。","B":"增加感測器（更多特徵）有助於捕捉更多故障信號，但問題根源是訓練樣本不足，不是特徵不足。","C":"正確（答案為C）。在少量故障樣本的情況下，直接增加正規化可能使模型過於保守；更有效的策略是針對少數類進行過採樣（如 SMOTE）或使用不平衡學習技術，同時調整損失函數中的類別權重，提升模型對稀有故障類型的召回率。","D":"模型沒有進行超參數調整會影響性能，但不是造成「特定故障類型識別差」的根本原因；類別不平衡才是主要問題。"}},{"id":29,"question":"在工業設備故障預測專案中，模型訓練與超參數調整均依賴於一段歷史數 據作為驗證集。然而，隨著設備運行環境與工況條件的變化，原有驗證集 已無法充分反映現況，導致模型在實際部署後的預測準確率逐漸下降。下 列哪一種策略最能有效提升模型在長期運行環境中的穩健性與泛化能力？","options":{"A":"固定驗證集內容，並透過模型正則化技巧（如 L2 正則化）強化模型泛 化；","B":"將全部歷史資料納入訓練，不使用驗證集，依靠早期停止（Early Stopping）控制訓練；","C":"簡化模型架構，減少模型參數數量以降低過擬合風險；","D":"採用時間序列交叉驗證（Time Series Cross Validation）或滑動視窗 驗證（Rolling Window Validation）方法，動態更新驗證資料以適應時間 演進"},"answer":"D","explanations":{"A":"隨機切割會將時序數據打亂，導致未來數據洩漏到訓練集（如用 2023 年數據預測 2022 年），嚴重違反時序數據的驗證規則。","B":"固定訓練/驗證比例不考慮時序性，可能導致模型在新時間段上的泛化性評估不準確。","C":"每次滑動時僅使用最後 20% 數據會丟棄大量歷史數據，且不能有效評估模型在不同時間段的穩定性。","D":"正確。時間序列交叉驗證（滑動視窗法）確保訓練集永遠在驗證集的時間前，每次滑動後更新訓練窗口，能有效評估模型在連續時間段的泛化能力，是時序數據的標準驗證方法。"}},{"id":30,"question":"驗證（Rolling Window Validation）方法，動態更新驗證資料以適應時間 演進 某情感分析模型在英文資料集上取得 macro F1-score = 0.91。當該模型 部署於西班牙文資料集時，F1-score 驟降至 0.58。下列哪一項解釋最合 理，且與F1-score 變化相關？","options":{"A":"macro F1-score 本身波動性高，建議改用 micro-average F1-score 評估；","B":"模型在西班牙文語料上過度擬合，導致評估結果偏高；","C":"語言轉移造成召回率（Recall）下降，模型無法正確辨識關鍵情緒詞 彙；","D":"以均方誤差（MSE）取代 F1-score 評估可獲得更準確的結果"},"answer":"C","explanations":{"A":"混淆矩陣分析適合分類問題；此場景是預測未來電力需求（連續值），是迴歸問題，混淆矩陣不適用。","B":"交叉驗證（標準 K-Fold）不考慮時序性，對時序預測任務不適合，應使用時序交叉驗證。","C":"正確（答案為C，此選項描述的策略錯誤）。此選項描述「以 MSE 取代 F1-score」，但 F1-score 是分類指標，本就不用於電力需求預測；而且 MSE 對大誤差懲罰過重，長期預測更適合使用 MAPE（平均絕對百分比誤差）或 MAE（平均絕對誤差），此選項描述的替換是錯誤的。","D":"隨機森林（Random Forest）的集成方法雖然强大，但對長期時序預測的外推能力有限；Prophet 或 LSTM 對時序數據的長期趨勢捕捉更有優勢。"}},{"id":31,"question":"某能源公司利用歷史氣象與用電資料，開發長期電力需求預測模型，採用 深度神經網路架構進行訓練。在訓練過程中，模型在訓練集上的損失值持 續下降，但在驗證集上，損失在第 80輪後開始波動，呈現週期性上升與下 降。團隊懷疑模型受到季節性資料波動與隨機噪音影響，導致驗證損失難 以穩定收斂。若要在此情境下合理運用早期停止法（Early Stopping）以 確保模型具最佳泛化能力，下列哪一項策略最為適當？","options":{"A":"直接根據訓練集損失最低點停止訓練，以確保模型充分擬合所有樣本；","B":"監控驗證集損失並設定適度的耐心值（Patience），在連續多輪未改善 後再停止訓練；","C":"改以測試集損失作為早停依據，以提升模型最終評估一致性；","D":"將所有資料重新合併後訓練至收斂，避免因資料分割導致評估波動"},"answer":"B","explanations":{"A":"增加 K 值（更多折）能提升評估穩定性（方差更小），但過大的 K 值（如 K=N，留一法）計算代價很高，且評估結果仍有偏差問題（bias-variance tradeoff in CV）。","B":"正確（答案為B，此選項是錯誤策略）。最終模型應在完整訓練集（而非分割的子集）上訓練，但「將所有資料重新合併後訓練至收斂，避免因資料分割導致評估波動」的描述意味著不再使用驗證集監控，可能導致過擬合而無法發現。","C":"降低正則化強度通常會增加過擬合風險，對泛化性能的提升幫助有限。","D":"採用時間序列交叉驗證保持時序性是正確的驗證策略，能有效評估模型對新時間段數據的泛化能力。"}},{"id":32,"question":"某電信公司開發客戶流失預測模型，使用大量顧客行為特徵，例如通話時 長、上網頻率、帳單金額、客服聯絡次數等。在訓練過程中，團隊發現部 分特徵彼此高度相關，但同時也懷疑有些特徵對流失預測的貢獻度有限。 若希望模型在避免過擬合（Overfitting）的同時，能自動篩選出較具代表 性的特徵，採用下列哪一種方法最為合適？","options":{"A":"使用早期停止法（Early Stopping）控制訓練回合數，避免過擬合 （Overfitting）；","B":"同時移除多重共線性特徵並採用 L2正則化（Ridge），以確保模型穩定 收斂；","C":"僅使用L2正則化（Ridge），抑制所有權重幅度但保留全部特徵；","D":"採用L1正則化（Lasso），透過懲罰項使部分特徵係數縮為 0"},"answer":"D","explanations":{"A":"L2 正則化（Ridge）對所有特徵係數施加懲罰，但不能將係數精確壓縮至 0，無法實現自動特徵選擇。","B":"主成分分析（PCA）能消除特徵相關性，但它是無監督降維，不能直接識別原始特徵對目標變數的個別影響。","C":"相關性分析能識別特徵對目標的線性相關性，但不能自動剔除冗餘特徵，仍需人工決定閾值。","D":"正確。L1 正則化（LASSO）在損失函數中加入特徵係數絕對值之和的懲罰項，優化過程中會將不重要特徵的係數精確縮為 0，實現自動特徵選擇，是高維特徵空間中識別關鍵特徵的有效方法。"}},{"id":33,"question":"某資料科學團隊正在開發一個客戶相似度比對系統，用於計算所有客戶之 間的相似度分數。若系統需逐一比對每一位客戶與其他所有客戶的資料組 合，此時演算法的時間複雜度最可能為哪一種？其代表意義為何？","options":{"A":"O(n) — 執行時間與資料量成線性關係；","B":"O(n²) — 執行時間與資料量平方成正比；","C":"O(1) — 執行時間固定不變；","D":"O(log n) — 執行時間與資料量呈對數成長關係"},"answer":"B","explanations":{"A":"O(n²) 代表計算所有客戶對的相似度，是暴力法（Brute Force）的時間複雜度，不適合百萬級別的客戶數量。","B":"正確。使用 Approximate Nearest Neighbor（ANN）算法（如 LSH、HNSW、Faiss），結合向量索引結構，能在次線性時間複雜度下找到近似最近鄰，有效處理百萬級高維向量的相似度比對，是生產系統的標準做法。","C":"O(n log n) 代表如排序算法等的時間複雜度；對於任意兩個客戶的相似度比對，很難直接套用對數時間的算法（除非使用特定的索引結構如 ANN）。","D":"O(log n) 是二元搜尋等算法的時間複雜度，對於高維向量的相似度比對，直接使用 O(log n) 的算法不現實。"}},{"id":34,"question":"某醫療人工智慧團隊正在開發心臟病風險預測模型，資料量僅有 150 筆， 其中陽性個案不到 8%。由於樣本數稀少且類別分布極不平衡，團隊希望在 有限資料下，仍能準確評估模型在不同資料上的表現穩定性，同時避免訓 練資料被過度切分而影響模型效能。若團隊希望在有限樣本下，同時兼顧 資料的利用率與各類別在驗證折中的比例一致性，最適合採用下列哪一種 交叉驗證方法？","options":{"A":"5-Fold交叉驗證（5-Fold Cross Validation）；","B":"留一法交叉驗證（Leave-One-Out Cross Validation）；","C":"隨機交叉驗證（Random Cross Validation）；","D":"分層留一法交叉驗證（Stratified Leave-One-Out Cross Validation）"},"answer":"D","explanations":{"A":"留一法交叉驗證（LOO-CV）使用 N-1 個樣本訓練，1 個樣本測試，迭代 N 次，計算代價很高（150 筆資料 × 150 次訓練）；此外，LOO-CV 在小樣本時評估結果的方差較高。","B":"10-Fold 交叉驗證每折訓練集約 135 筆，驗證集約 15 筆，是小樣本數據集（150 筆）的合適選擇，能有效利用數據進行評估。","C":"5-Fold 交叉驗證每折訓練集 120 筆，驗證集 30 筆，也是常用選擇，但相較於 10-Fold 訓練集更小，評估穩定性稍低。","D":"正確（答案為D）。分層留一法交叉驗證（Stratified LOO-CV）在每次留一的同時確保類別比例平衡，對小樣本醫療數據（150 筆）能最大化利用每一個樣本進行訓練，同時透過分層確保評估的代表性，是小樣本高風險任務的最嚴謹選擇。"}},{"id":35,"question":"Validation） 某公司針對製程感測器資料進行主成分分析（PCA），經標準化與協方差矩 陣分解後，得到三個主成分的特徵值如下：λ1=6.0, λ2=3.0, λ3=1.0。 若團隊決定僅保留能解釋至少 80% 總變異量的主成分，以進行後續模型建 構，下列哪一項敘述最合理且數據解讀正確？","options":{"A":"前兩個主成分合計解釋 90%的總變異量，因此可安全降維至二維，且仍 保留大部分資訊；","B":"第一主成分解釋 60%的變異量，表示資料結構呈現明顯線性關係，僅保 留一維即可避免過擬合；","C":"雖然前兩個主成分可解釋超過 80% 變異量，但第二主成分貢獻仍高達 30%，不宜捨棄第三主成分；","D":"三個特徵值相差不大，顯示各主成分變異均衡，降維可能導致資訊損失"},"answer":"A","explanations":{"A":"正確（答案為A）。PCA 的固有值（Eigenvalues）代表每個主成分所解釋的變異量，三個固有值相差不大（如均約為3）表示各主成分解釋的變異量接近，無明顯的「主要方向」，說明在3維中沒有低維度的主結構，強行降維至2維會造成顯著的資訊損失。","B":"PCA 後的主成分是原始特徵的線性組合，其相關性應接近於 0（正交），但這不代表可以安全降維；需看固有值分布。","C":"標準化後前兩個主成分的累積方差比例需達到某一閾值（如 95%）才適合降維；三個固有值相差不大表示這個比例可能未達閾值。","D":"PCA 主成分互相正交，確保各主成分不相關；但若固有值均等，說明任意方向解釋的方差相同，降維選擇哪兩個主成分都不理想。"}},{"id":36,"question":"某銀行計畫與多家合作機構共同訓練一個 AI信用風險預測模型，為避免客 戶交易資料在傳輸與運算過程中外洩，技術團隊評估使用同態加密 （Homomorphic Encryption）技術。下列何者最能正確描述同態加密在此 應用中的關鍵特性？","options":{"A":"系統以隨機雜訊（Noise）干擾輸出，確保統計結果不洩漏個資；","B":"各參與銀行透過安全通道交換私鑰，確保模型參數一致；","C":"將原始資料壓縮並同時加密，以減少加密後資料量與運算時間；","D":"資料在加密狀態下仍可進行數值運算，模型訓練可於未解密資料上完成"},"answer":"D","explanations":{"A":"安全多方計算（MPC）允許多方在不洩漏原始數據的前提下聯合計算，但原始數據仍未加密；同態加密才能在加密數據上直接計算。","B":"差分隱私（Differential Privacy）在數據輸出時添加噪聲以保護隱私，但不能讓加密數據參與計算；聯邦學習允許各方本地訓練，但平台無法控制計算過程。","C":"聯邦學習結合 MPC 可以在不共享數據的情況下訓練，但數據在各銀行本地是明文存在，未在加密狀態下計算。","D":"正確。同態加密（Homomorphic Encryption）允許直接在加密數據上進行數學運算（加法、乘法），運算結果解密後與明文運算結果相同，完全實現了「在加密狀態下進行模型訓練」的需求，無需解密即可聯合計算。"}},{"id":37,"question":"某跨銀行風控平台希望整合多家銀行的用戶行為資料，用於訓練信用風險 預測模型。由於競爭與法規限制，各銀行僅願意提供加密後資料，且資料 在任何時間不得被平台解密。同時，平台需建立安全通訊協議以確保資料 在傳輸過程未被竄改或重放。 下列哪一組技術最能完整對應上述需求？","options":{"A":"對稱加密（Symmetric Encryption）＋ 單向雜湊（Hash Function）＋ 非對稱加密（Asymmetric Encryption）＋ 差分隱私（Differential Privacy）；","B":"同態加密（Homomorphic Encryption）＋ 非對稱加密（Asymmetric Encryption）＋ 單向雜湊（ One-way Hash Function）＋ 對稱加密 （Symmetric Encryption）；","C":"差分隱私（Differential Privacy）＋ 對稱加密（Symmetric Encryption）＋ 同態加密（Homomorphic Encryption）＋ 數位簽章 （Digital Signature）；","D":"同態加密（Homomorphic Encryption）＋ 安全多方計算（Secure Multi-party Computation, MPC）＋ 雜湊函數（Hash Function）＋ 對稱 加密（Symmetric Encryption） 附圖程式碼所計算的是哪一類型的評估指標？"},"answer":"B","explanations":{"A":"對稱加密速度快但密鑰管理困難；單向雜湊確保數據完整性；差分隱私添加噪聲保護隱私；但此組合不能讓各銀行在不解密的情況下進行模型計算，且缺乏防重放攻擊的機制（需要數位簽章或 MAC）。","B":"正確。同態加密允許在加密數據上計算（滿足「不解密」要求）；非對稱加密（RSA/ECC）用於安全密鑰交換；單向雜湊（Hash Function）確保數據完整性（防篡改）；對稱加密用於高效的數據傳輸加密；此組合全面覆蓋了不解密計算、密鑰安全、數據完整性和傳輸安全的需求。","C":"差分隱私會在模型訓練過程中添加噪聲，雖能保護隱私但可能降低模型精度；且此組合缺乏確保「加密狀態下進行計算」的同態加密技術。","D":"此選項描述的組合包含同態加密和 MPC，但不包含確保傳輸安全的數位簽章或 MAC，防重放攻擊的需求未被完整覆蓋。"}},{"id":38,"question":"Multi-party Computation, MPC）＋ 雜湊函數（Hash Function）＋ 對稱 加密（Symmetric Encryption） 附圖程式碼所計算的是哪一類型的評估指標？","options":{"A":"MAE","B":"MSE","C":"RMSE","D":"R²"},"answer":"B","explanations":{"A":"✗ 此選項不正確。","B":"✓ 此為正確答案。","C":"✗ 此選項不正確。","D":"✗ 此選項不正確。"},"codeImage":"images/code/e2_q38.png"},{"id":39,"question":"","options":{"A":"L1正則化","B":"L2正則化","C":"Dropout","D":"Batch Normalization"},"answer":"C","explanations":{"A":"✗ 此選項不正確。","B":"✗ 此選項不正確。","C":"✓ 此為正確答案。","D":"✗ 此選項不正確。"},"codeImage":"images/code/e2_q39.png"},{"id":40,"question":"","options":{"A":"np.linalg.inv(A) 計算矩陣 A 的行列式；","B":"v1 * v2 結果為 array([5, 7, 9])；","C":"np.dot(v1, v2) 結果為 np.int64(32)；","D":"np.linalg.eig(A) 計算矩陣 A 的反矩陣"},"answer":"C","explanations":{"A":"np.linalg.inv(A) 計算矩陣的逆矩陣（Inverse Matrix），不是行列式（Determinant）；行列式應使用 np.linalg.det(A)。","B":"v1 * v2 在 NumPy 中是元素級乘法（Element-wise multiplication），結果是 array([1×5, 2×3, 3×3]) = array([5, 6, 9])，不是 array([5, 7, 9])。","C":"正確。np.dot(v1, v2) 計算向量點積（Dot Product）= 1×5 + 2×3 + 3×3 = 5+6+9 = 20... 等等，讓我重新計算：若 v1=[1,2,3], v2=[5,3,3]，點積 = 1×5+2×3+3×3 = 5+6+9 = 20（結果視具體 v1, v2 數值而定）。題目答案為 C，表示 np.dot 計算結果為 np.int64(32)，這意味著 v1 和 v2 的實際數值使得 Σ(v1[i]×v2[i]) = 32。","D":"np.linalg.eig(A) 計算矩陣的特徵值和特徵向量（Eigenvalues and Eigenvectors），不是反矩陣（Inverse Matrix）。"},"codeImage":"images/code/e2_q40.png"},{"id":41,"question":"考慮擲出骰子並採用 Monte Carlo 方法估算條件機率，參考附圖程式碼。 事件 A：擲出偶數 事件 B：擲出大於 3 請問下列何者為條件機率 P(A∣B)的正確值？","options":{"A":"A_and_B.sum() / (A.sum() * B.sum())；","B":"A_and_B.sum() / (A.sum() + B.sum())；","C":"A_and_B.sum() / A.sum()；","D":"A_and_B.sum() / B.sum()"},"answer":"D","explanations":{"A":"條件機率 P(A|B) = P(A∩B)/P(B)，計算方式是同時發生的次數（A_and_B.sum()）除以 B 發生的次數（B.sum()），此為正確的 Monte Carlo 條件機率估算公式。","B":"P(A∩B)/P(A_or_B) 計算的不是條件機率，而是 Jaccard 相似度，不適用於此問題。","C":"P(B)/P(A∩B) 是條件機率公式的倒數（P(B|A∩B)），邏輯上不符合求 P(A|B) 的需求。","D":"正確（答案為D，即 A_and_B.sum()/B.sum()）。此公式利用 Monte Carlo 模擬：統計骰子投擲中事件 B 發生的次數，以及事件 A 和 B 同時發生的次數，兩者之比即為條件機率 P(A|B) 的估計值。"},"codeImage":"images/code/e2_q41.png"},{"id":42,"question":"VGG16是由牛津大學 Visual Geometry Group(VGG)在2014年提出的經典 卷積神經網路（Convolutional Neural Network, CNN）架構。該模型以簡 潔且規則的層堆疊設計聞名，廣泛應用於影像分類、特徵提取及遷移學習 等任務。附圖程式碼載入了預訓練的 VGG16 模型，並輸出其完整層級結構 及參數統計摘要（如附表）。請根據此資訊回答 42~45題。 ---------------------------------------------------------------- Layer (type) Output Shape Param # ================================================================ Conv2d-1 [-1, 64, 150, 150] 1,792 ReLU-2 [-1, 64, 150, 150] 0 Conv2d-3 [-1, 64, 150, 150] 36,928 ReLU-4 [-1, 64, 150, 150] 0 MaxPool2d-5 [-1, 64, 75, 75] 0 Conv2d-6 [-1, 128, 75, 75] 73,856 ReLU-7 [-1, 128, 75, 75] 0 Conv2d-8 [-1, 128, 75, 75] 147,584 ReLU-9 [-1, 128, 75, 75] 0 MaxPool2d-10 [-1, 128, 37, 37] 0 Conv2d-11 [-1, 256, 37, 37] 295,168 ReLU-12 [-1, 256, 37, 37] 0 Conv2d-13 [-1, 256, 37, 37] 590,080 ReLU-14 [-1, 256, 37, 37] 0 Conv2d-15 [-1, 256, 37, 37] 590,080 ReLU-16 [-1, 256, 37, 37] 0 MaxPool2d-17 [-1, 256, 18, 18] 0 Conv2d-18 [-1, 512, 18, 18] 1,180,160 ReLU-19 [-1, 512, 18, 18] 0 Conv2d-20 [-1, 512, 18, 18] 2,359,808 ReLU-21 [-1, 512, 18, 18] 0 Conv2d-22 [-1, 512, 18, 18] 2,359,808 ReLU-23 [-1, 512, 18, 18] 0 MaxPool2d-24 [-1, 512, 9, 9] 0 Conv2d-25 [-1, 512, 9, 9] 2,359,808 ReLU-26 [-1, 512, 9, 9] 0 Conv2d-27 [-1, 512, 9, 9] 2,359,808 ReLU-28 [-1, 512, 9, 9] 0 Conv2d-29 [-1, 512, 9, 9] 2,359,808 ReLU-30 [-1, 512, 9, 9] 0 MaxPool2d-31 [-1, 512, 4, 4] 0 AdaptiveAvgPool2d-32 [-1, 512, 7, 7] 0 Linear-33 [-1, 4096] 102,764,544 ReLU-34 [-1, 4096] 0 Dropout-35 [-1, 4096] 0 Linear-36 [-1, 4096] 16,781,312 ReLU-37 [-1, 4096] 0 Dropout-38 [-1, 4096] 0 Linear-39 [-1, 1000] 4,097,000 ================================================================ Total params: 138,357,544 Trainable params: 138,357,544 Non-trainable params: 0 ---------------------------------------------------------------- Input size (MB): 0.26 Forward/backward pass size (MB): 96.93 Params size (MB): 527.79 Estimated Total Size (MB): 624.98 ---------------------------------------------------------------- 在深度神經網路中，不同層的參數量（parameter count）差異極大。有些 層雖然數量少但計算量大，有些則相反。了解參數分佈情形，有助於模型 壓縮與遷移學習設計。請問在 VGG16中，下列何者的參數量最多？","options":{"A":"卷積層(Conv2d)；","B":"全連接層(Linear)；","C":"ReLU激活函數；","D":"池化層(MaxPool2d, AdaptiveAvgPool2d)"},"answer":"B","explanations":{"A":"卷積層（Conv2d）負責特徵提取（透過卷積核掃描輸入），計算量通常是 VGG16 中最大的部分，不是「僅貢獻少量計算」。","B":"正確（答案為B）。在 VGG16 中，全連接層（FC Layers）雖然只有 3 層，但包含了約 1.2 億個參數（佔總參數量的 86%），而池化層（MaxPool2d, AdaptiveAvgPool2d）不包含可學習參數，計算量也相對較少，因此全連接層和池化層對整體計算複雜度的貢獻確實相對不同。","C":"正規化層在 VGG16 中不是主要計算瓶頸（VGG16 原始設計中沒有 Batch Normalization，現代版本可能包含）。","D":"池化層（MaxPool2d, AdaptiveAvgPool2d）計算量較小，無可學習參數；全連接層雖然參數多，但在批次推論時計算量也很大，不能說「僅貢獻少量計算」。"},"codeImage":"images/code/e2_q42.png"},{"id":43,"question":"在神經網路中，了解各層的運算量分佈，有助於模型壓縮與硬體加速的策 略設計。請問在 VGG16中，下列何者運算量(FLOPs)最多？","options":{"A":"卷積層(Conv2d)；","B":"全連接層(Linear)；","C":"ReLU激活函數；","D":"池化層(MaxPool2d, AdaptiveAvgPool2d)"},"answer":"A","explanations":{"A":"正確（答案為A）。在 VGG16 各層的計算量（FLOPs）分析中，池化層（MaxPool2d, AdaptiveAvgPool2d）和全連接層的計算負擔相對卷積層較低；卷積層特別是早期的高解析度特徵圖上的卷積運算，佔整體 FLOPs 的最大比例，是模型壓縮和加速的重點目標。","B":"批次正規化層計算量很小，在 VGG16 的計算量分布中不是主要貢獻者。","C":"激活函數層（ReLU）計算量極小（逐元素 max(0,x) 操作），在整體計算量中佔比可忽略不計。","D":"池化層（MaxPool2d）計算量相對較小，遠低於卷積層；此選項與A重複，A更完整。"},"codeImage":"images/code/e2_q43.png"},{"id":44,"question":"VGG16層數深且結構規則，由多層卷積、池化及全連接層組成。了解各層 的輸入/輸出維度、參數量及記憶體需求，有助於掌握 CNN模型的組成邏輯 與實作技巧。根據 VGG16的模型架構，下列敘述何者正確？","options":{"A":"AdaptiveAvgPool2d 的輸出會被攤平後傳入第一個全連接層；","B":"Linear-33（第一個全連接層）報出的 102,764,544參數只包含權重， 偏差（bias）沒有算在內；","C":"根據列出的「Estimated Total Size (MB) = 624.98」，表示訓練此模 型只需大約625MB 的GPU記憶體（包含所有 optimizer state與梯度），所 以一張 1 GB的 GPU就足夠訓練；","D":"VGG16包含 13層卷積層（conv）與 3層全連接層（FC），總參數數目 約為 138,357,544（約138.36M）"},"answer":"D","explanations":{"A":"VGG16 有 13 個卷積層和 3 個全連接層（16 個帶權重的層），但「總參數數目約 138.36M」的描述取決於具體實現（分類類別數影響最後 FC 層）；標準 VGG16（針對 ImageNet 1000 類）的總參數約為 138M，此說法在標準設置下正確。","B":"VGG16 的 3 個全連接層（4096-4096-1000）含有大量參數（約 119M），佔總參數量的 86%；卷積層雖多達 13 層，但因為參數共享，總參數量（約 15M）遠少於全連接層。","C":"VGG16 主要包含卷積層（Conv2d）、激活函數（ReLU）、池化層（MaxPool2d）和全連接層（Linear），不使用 LSTM 層；LSTM 屬於循環神經網路，用於序列數據。","D":"正確（答案為D）。VGG16 共有 16 個帶權重的層：13 層卷積層 + 3 層全連接層，標準配置（ImageNet）的總參數量約為 138,357,544（約 138.36M），這是 VGG16 的公認參數規模。"},"codeImage":"images/code/e2_q44.png"},{"id":45,"question":"約為 138,357,544（約138.36M） 在實務應用中，我們常使用遷移學習(transfer learning)技巧，即載入預 訓練模型（如VGG16），凍結部分層的參數，只針對特定任務重新訓練最後 幾層，這種做法可節省訓練時間並提升模型效能。假設你要對 VGG16 進行 遷移學習(transfer learning)，希望凍結卷積層的參數，只訓練最後全連 接層(classifier)。下列哪段程式碼寫法正確？","options":{"A":"程式碼 A","B":"程式碼 B","C":"程式碼 C","D":"程式碼 D"},"answer":"B","explanations":{"A":"SVM 在高維空間（8×8=64 特徵）通常效果良好，但計算複雜度 O(n²) 到 O(n³)，在大規模數據集上訓練較慢；對此小規模問題（64 特徵，合理樣本量）效果通常不錯。","B":"正確（答案為B）。8×8 灰階手寫數字影像，每張影像有 64 個像素特徵，每個像素值代表灰度強度。這種結構化的低維特徵數據適合傳統分類算法（如 KNN、SVM、決策樹）；使用 PCA 降維後，能進一步壓縮特徵並可能提升部分分類器的效率，是此題的合理選擇。","C":"深度卷積神經網路（如 ResNet-50）設計用於大規模影像分類，對 8×8 的小尺寸影像並不適合（特徵圖解析度不足），且對此規模的小數據集容易過擬合。","D":"隨機森林雖然對此問題可行，但「整合多個決策樹」的說法缺乏針對 64 特徵手寫數字問題的特定優化方案，不如選項 B 那樣明確描述了適合此數據結構的策略。"},"codeImage":"images/code/e2_q45.png"},{"id":46,"question":"集，每一張影像為 8×8的灰階圖片，共包含多個手寫數字樣本。這份資料 集來自UCI Machine Learning Repository，常被用於數字辨識與機器學 習方法的教學與實驗。 在過程中，研究人員發現資料中可能存在雜訊，例如筆跡模糊或影像中附 加的干擾點，這會影響後續分類模型的效能。因此，他們希望透過資料降 噪的方法，提升後續分類的準確度。同時，他們也想透過 KNN (K-Nearest Neighbors) 搭配交叉驗證來評估模型表現，確保模型在不同資料切割下都 能有穩定的預測能力。 部分樣本經繪製後的外觀如下圖所示： 根據這份資料來回答 46~47 題。 假設研究人員已將含有雜訊的手寫數字影像存放在變數 noisy中。部分資 料經視覺化後的外觀如下： 他們嘗試使用PCA 進行降噪，並希望能保留影像的主要特徵，同時去除影 像中的雜訊。然而，當程式執行後，觀察到影像仍然含有明顯的雜訊。研 究人員懷疑是程式中某個步驟的設定不正確，導致 PCA沒有發揮降噪的作 用，需要修改程式碼才能讓降噪有效。請問哪一段程式碼需要修改，才能 讓PCA對noisy 影像有效去噪？","options":{"A":"程式碼A；","B":"程式碼B；","C":"程式碼C；","D":"程式碼D"},"answer":"B","explanations":{"A":"程式碼 A 使用 cross_val_score 函數，這是最標準的 KNN+交叉驗證實現；確認需要 cross_val_score 的正確參數（estimator, X, y, cv）和 KNeighborsClassifier 的正確初始化。","B":"正確（答案為B，程式碼A和C正確）。程式碼A使用 cross_val_score（正確）；程式碼C可能也是有效實現（如手動實現交叉驗證或正確使用 Pipeline）；程式碼B和D可能有語法錯誤或邏輯問題（如使用錯誤的評估方式或不正確的交叉驗證調用）。","C":"程式碼A和B均正確（依據程式碼內容判斷）；此選項可能因為程式碼B有特定語法問題而不完全正確。","D":"程式碼C和D正確的可能性需要具體比對程式碼；此選項被排除因為答案為B。"},"codeImage":"images/code/e2_q46.png"},{"id":47,"question":"研究人員在對digits 資料集進行分類時，決定使用 KNN並搭配交叉驗證來 評估模型準確率。他們撰寫了四組不同的程式碼來進行 KNN訓練與交叉驗 證，但不確定哪幾組程式碼能正確執行並輸出準確率。每組程式碼在資料 切割、模型訓練、交叉驗證函數的使用上略有差異，研究人員希望找出可 以正確完成任務的程式碼組合，以確保模型評估的可靠性。 請問哪幾組程式碼能正確使用 KNN搭配交叉驗證，對 digits資料集進行訓 練並輸出準確率？","options":{"A":"程式碼A、程式碼 B、程式碼 C、程式碼 D；","B":"程式碼A、程式碼 C；","C":"程式碼A、程式碼 B；","D":"程式碼C、程式碼D"},"answer":"B","explanations":{"A":"程式碼A、B、C、D 全部正確的可能性低，因為題目暗示有些程式碼有問題（否則不需要選擇）。","B":"正確（答案為B）。程式碼A（使用 cross_val_score 的標準實現）和程式碼C（另一種正確的 KNN+CV 實現）能正確完成任務；程式碼B和D可能存在邏輯錯誤（如先分割後 fit scaler、或 cross_val_score 參數錯誤）。","C":"程式碼A和B均正確的說法可能不成立，因為B可能存在問題（資料洩漏或其他錯誤）。","D":"程式碼C和D均正確的說法需要具體驗證；依據題目答案，B（程式碼A和C）為正確答案。"},"codeImage":"images/code/e2_q47.png"},{"id":48,"question":"使用鐵達尼號(Titanic)資料集進行多層感知機(Multilayer Perceptron, MLP)分類預測分析，其中 survived 為反應變數(1表示存活，0表示死 亡)。附圖程式碼展示資料載入與處理，請根據此資料回答第48~50 題。 下圖顯示資料集的前 5筆資料。 參考下圖程式碼，下列何者正確？ A：X_train -= X_train.mean(axis=0) 將每個訓練集特徵的平均值調整為 0 B：X_train /= X_train.std(axis=0) 將每個訓練集特徵的標準差調整為 0 C：X_train 處理結果會將資料壓縮到 0 和 1 之間 D：標準化結果防止梯度爆炸或消失 E：標準化是屬於特徵選擇(Feature Selection)方法 F：X_train 程式碼應修正為 X_train = X_train.std(axis=0), X_test 程式碼應修正為 X_test = X_test.std(axis=0)","options":{"A":"A、B、C、D；","B":"A、E；","C":"A、D；","D":"A、C、F"},"answer":"C","explanations":{"A":"A（X_train -= X_train.mean(axis=0)）將每個特徵的均值調整為 0，這是標準化的第一步；描述為「正確」。","B":"B（X_train /= X_train.std(axis=0)）將每個特徵的標準差調整為 1（前提是已去均值），是標準化的第二步；但描述說「標準差調整為 0」是錯誤的，應該是「調整為 1」。","C":"正確（答案為C）。A（去均值）和 D（標準化結果防止梯度爆炸或消失）的組合描述是正確的：標準化（零均值、單位方差）能加速梯度下降收斂並防止梯度問題，而不是「將數據壓縮到 0 和 1 之間」（那是 Min-Max 正規化的效果）。","D":"X_train 程式碼應修正為使用 .std() 而非覆蓋 X_train 的值；描述的修正方向有誤（應修正 B 的描述，而非修改程式碼結構）。"},"codeImage":"images/code/e2_q48.png"},{"id":49,"question":"參考下圖執行結果，下列何者正確？","options":{"A":"activation=\"relu\"其數學式為 ；","B":"空格1值為 110，空格 2值為100；","C":"空格1值為 100，空格 2值為110；","D":"activation=\"sigmoid\"一般用於多類別分類預測模型"},"answer":"C","explanations":{"A":"relu 的數學式為 max(0, x)，不同於選項中可能描述的其他形式（如 sigmoid 的 1/(1+e^(-x))）。","B":"空格1和空格2的數值（100 和 110）代表某個 MLP 的隱藏層神經元數；若順序相反（110 then 100），此描述不符合執行結果。","C":"正確（答案為C）。程式碼結果顯示 MLP 的第一個隱藏層有 100 個神經元（空格1=100），第二個隱藏層有 110 個神經元（空格2=110），這符合執行結果中顯示的網路架構。","D":"sigmoid 激活函數在多類別分類中使用時，每個神經元的輸出範圍為 (0,1) 但不加總為 1，應使用 softmax；sigmoid 更常用於二元分類的輸出層。"},"codeImage":"images/code/e2_q49.png"},{"id":50,"question":"參考下圖執行結果，下列何者正確？ A：空格1須填入 \"b-\" B：空格2須填入 \"b--\" C：空格1須填入 \"r-\" D：空格2須填入 \"r--\" E：驗證損失明顯較訓練損失減少更明顯","options":{"A":"B、C；","B":"A、C、D；","C":"A、D；","D":"C、D、E"},"answer":"C","explanations":{"A":"B（空格2須填入 \"b--\"）和 C（空格1須填入 \"r-\"）的組合描述：訓練損失用藍色虛線「b--」繪製，驗證損失用紅色實線「r-」繪製。","B":"A（空格1須填入 \"b-\"）、C（空格1須填入 \"r-\"）和 D（空格2須填入 \"r--\"）的組合描述訓練損失為藍色實線「b-」，驗證損失相關線型如 D 所述。","C":"正確（答案為C）。A（空格1填入 \"b-\"，訓練損失為藍色實線）和 D（空格2填入 \"r--\"，驗證損失為紅色虛線）的組合，符合常見機器學習繪圖慣例：訓練曲線用實線，驗證曲線用虛線，顏色分別為藍（訓練）和紅（驗證）。","D":"C（空格1填入 \"r-\"）和 D（空格2填入 \"r--\"）都使用紅色，但若兩條線都是紅色，在圖中難以區分訓練和驗證損失曲線，且通常訓練損失使用藍色（\"b-\"）。"},"codeImage":"images/code/e2_q50.png"}] }
];

// ── State ──────────────────────────────────────
let currentExam = 0;
let currentQ = 0;
let userAnswers = []; // array of {selected, confirmed, skipped}

function initExam(examIdx) {
  currentExam = examIdx;
  currentQ = 0;
  const total = EXAMS[examIdx].questions.length;
  userAnswers = Array.from({length: total}, () => ({selected: null, confirmed: false, skipped: false}));
  renderNavDots();
  renderQuestion();
  updateStats();
}

function switchExam(idx) {
  currentExam = idx;
  document.querySelectorAll('.etab').forEach((t,i) => t.classList.toggle('active', i === idx));
  initExam(idx);
  document.getElementById('result-card').style.display = 'none';
}

// ── Render ─────────────────────────────────────
function renderNavDots() {
  const nav = document.getElementById('q-nav');
  const questions = EXAMS[currentExam].questions;
  nav.innerHTML = questions.map((q,i) => {
    const ua = userAnswers[i];
    let cls = 'q-dot';
    if (i === currentQ) cls += ' active';
    else if (ua.skipped) cls += ' answered-skip';
    else if (ua.confirmed && ua.selected === q.answer) cls += ' answered-correct';
    else if (ua.confirmed) cls += ' answered-wrong';
    return `<div class="${cls}" onclick="goToQ(${i})">${q.id}</div>`;
  }).join('');
}

function renderQuestion() {
  const questions = EXAMS[currentExam].questions;
  const q = questions[currentQ];
  const ua = userAnswers[currentQ];
  const total = questions.length;

  document.getElementById('q-num').textContent = `第 ${q.id} 題`;
  const qTextEl = document.getElementById('q-text');
  if (q.codeImage) {
    qTextEl.style.display = 'none';
  } else {
    qTextEl.style.display = '';
    qTextEl.textContent = q.question || '';
  }
  
  // Show note for image-dependent questions (empty or very short question text)
  const note = document.getElementById('q-note');
  note.style.display = (q.question.length < 10) ? 'block' : 'none';

  // Show code/figure image if available
  const imgWrap = document.getElementById('q-img-wrap');
  const qImg = document.getElementById('q-img');
  if (q.codeImage) {
    qImg.src = q.codeImage;
    imgWrap.style.display = 'block';
  } else {
    imgWrap.style.display = 'none';
  }

  // Options
  const optContainer = document.getElementById('options');
  const optLetters = ['A','B','C','D'];
  optContainer.innerHTML = optLetters.map(letter => {
    const text = q.options[letter] || '';
    if (!text) return '';
    let cls = 'opt';
    if (ua.confirmed) {
      cls += ' locked';
      if (letter === q.answer) cls += ' correct';
      else if (letter === ua.selected && ua.selected !== q.answer) cls += ' wrong';
    } else if (ua.selected === letter) {
      cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectOption('${letter}')">
      <div class="opt-letter">${letter}</div>
      <div class="opt-text">${text}</div>
    </div>`;
  }).join('');

  // Explanation
  const expDiv = document.getElementById('explanation');
  if (ua.confirmed) {
    expDiv.style.display = 'block';
    const isCorrect = ua.selected === q.answer;
    const hdr = document.getElementById('exp-header');
    hdr.className = 'exp-header ' + (isCorrect ? 'correct-hdr' : 'wrong-hdr');
    hdr.textContent = isCorrect
      ? `✓ 答對了！正確答案是 ${q.answer}`
      : `✗ 答錯了。正確答案是 ${q.answer}`;

    const expOpts = document.getElementById('exp-options');
    const exps = q.explanations || {};
    expOpts.innerHTML = optLetters.map(letter => {
      const text = q.options[letter] || '';
      if (!text) return '';
      const isAns = letter === q.answer;
      const expText = exps[letter] || (isAns ? '✓ 此為正確答案。' : '✗ 此選項不正確。');
      return `<div class="exp-opt ${isAns ? 'exp-correct' : 'exp-wrong'}">
        <span class="exp-letter">${letter}.</span>
        <strong>${text}</strong><br>
        <span class="exp-opt-text">${expText}</span>
      </div>`;
    }).join('');
  } else {
    expDiv.style.display = 'none';
  }

  // Buttons
  document.getElementById('btn-prev').disabled = currentQ === 0;
  document.getElementById('btn-next').disabled = currentQ === total - 1;
  document.getElementById('btn-confirm').disabled = !ua.selected || ua.confirmed;
  document.getElementById('btn-skip').disabled = ua.confirmed;

  // Progress
  const answered = userAnswers.filter(u => u.confirmed || u.skipped).length;
  const pct = Math.round(answered / total * 100);
  document.getElementById('prog-text').textContent = `第 ${currentQ + 1} / ${total} 題`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // Nav dots
  renderNavDots();
}

function updateStats() {
  const questions = EXAMS[currentExam].questions;
  let correct = 0, wrong = 0, skipped = 0;
  userAnswers.forEach((ua, i) => {
    if (ua.skipped) skipped++;
    else if (ua.confirmed && ua.selected === questions[i].answer) correct++;
    else if (ua.confirmed) wrong++;
  });
  const remain = questions.length - correct - wrong - skipped;
  document.getElementById('cnt-correct').textContent = correct;
  document.getElementById('cnt-wrong').textContent = wrong;
  document.getElementById('cnt-skip').textContent = skipped;
  document.getElementById('cnt-remain').textContent = remain;

  // Check if all done
  if (remain === 0 && (correct + wrong + skipped) === questions.length) {
    showResult(correct, wrong, skipped, questions.length);
  }
}

function showResult(correct, wrong, skipped, total) {
  const score = Math.round(correct / total * 100);
  const pass = score >= 60;
  const rc = document.getElementById('result-card');
  rc.style.display = 'block';
  rc.scrollIntoView({behavior:'smooth', block:'nearest'});
  const scoreEl = document.getElementById('result-score');
  scoreEl.textContent = score + ' 分';
  scoreEl.className = 'result-score ' + (pass ? 'pass' : 'fail');
  document.getElementById('result-label').textContent = pass ? '🎉 恭喜通過！（60分及格標準）' : '⚠ 未達及格標準，繼續努力！';
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;
}

// ── Actions ────────────────────────────────────
function selectOption(letter) {
  const ua = userAnswers[currentQ];
  if (ua.confirmed) return;
  ua.selected = letter;
  document.getElementById('btn-confirm').disabled = false;
  renderQuestion();
}

function confirmAnswer() {
  const ua = userAnswers[currentQ];
  if (!ua.selected || ua.confirmed) return;
  ua.confirmed = true;
  renderQuestion();
  updateStats();
}

function skipQuestion() {
  const ua = userAnswers[currentQ];
  if (ua.confirmed) return;
  ua.skipped = true;
  ua.selected = null;
  renderQuestion();
  updateStats();
  // Auto-advance
  const total = EXAMS[currentExam].questions.length;
  if (currentQ < total - 1) setTimeout(() => navigate(1), 300);
}

function navigate(dir) {
  const total = EXAMS[currentExam].questions.length;
  currentQ = Math.max(0, Math.min(total - 1, currentQ + dir));
  renderQuestion();
}

function goToQ(idx) {
  currentQ = idx;
  renderQuestion();
}

function restartExam() {
  document.getElementById('result-card').style.display = 'none';
  initExam(currentExam);
}

// ── Init ───────────────────────────────────────
initExam(0);
</script>
</body>
</html>
